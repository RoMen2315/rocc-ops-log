async function gsGetAll(){
  if(!isOnline)return null;
  try{
    const url=SCRIPT_URL+"?action=getAll&t="+Date.now()+"&r="+Math.random();
    const r=await fetch(url,{redirect:"follow"});
    if(!r.ok)return null;
    const text=await r.text();
    let j;try{j=JSON.parse(text)}catch{console.error("gsGetAll parse fail",text);return null}
    const out={};
    Object.entries(j.data||{}).forEach(([k,v])=>{
      let val;try{val=JSON.parse(v)}catch{val=v}
      // Normalize date keys: convert long date strings to YYYY-MM-DD format
      let nk=k;
      try{const d=new Date(k);if(!isNaN(d.getTime())&&k.length>10){nk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}}catch{}
      // If normalized key already exists, merge
      if(out[nk]&&typeof out[nk]==="object"&&typeof val==="object"){
        Object.entries(val).forEach(([sk,sv])=>{if(!out[nk][sk])out[nk][sk]=sv;else if(Array.isArray(sv)&&Array.isArray(out[nk][sk])){sv.forEach(item=>{if(!out[nk][sk].some(x=>JSON.stringify(x)===JSON.stringify(item)))out[nk][sk].push(item)})}else if(typeof sv==="object"&&typeof out[nk][sk]==="object"){Object.assign(out[nk][sk],sv)}});
      }else{out[nk]=val}
    });
    return out;
  }catch(e){console.error("gsGetAll",e);return null}
}

async function gsSet(key,value,userName){
  if(!isOnline)return false;
  try{
    // Try POST first
    const r=await fetch(SCRIPT_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"merge",key,value:JSON.stringify(value),user:userName||""})});
    if(r.ok){try{const j=await r.json();if(j.success)return true}catch{}}
  }catch{}
  // Fallback: GET-based save
  try{
    const v=encodeURIComponent(JSON.stringify(value));
    const u=encodeURIComponent(userName||"");
    const url=SCRIPT_URL+"?action=save&key="+encodeURIComponent(key)+"&value="+v+"&user="+u+"&t="+Date.now();
    const r2=await fetch(url,{redirect:"follow"});
    if(r2.ok){try{const j2=await r2.json();return j2.success}catch{}}
  }catch(e){console.error("gsSet GET fallback",e)}
  return false;
}

function getWS(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-day+(day===0?-6:1));dt.setHours(0,0,0,0);return dt}
function dkf(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getDD(ws,i){const d=new Date(ws);d.setDate(d.getDate()+i);return d}
function fS(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function fL(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
function tIdx(){return(new Date().getDay()+6)%7}
function fT(ts){return new Date(ts).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
function curHr(){return new Date().getHours()}
function pct(n,d){return d>0?Math.round(n/d*100):0}

// Deep merge for sync: merges at day > section > site > slot level
function deepMerge(local,remote){
  const m={...local};
  Object.entries(remote).forEach(([dk,rv])=>{
    if(rv&&typeof rv==="object"&&!Array.isArray(rv)){
      m[dk]={...(m[dk]||{})};
      Object.entries(rv).forEach(([sk,sv])=>{
        if(sk==="shifts"){m[dk].shifts=sv}
        else if(sv&&typeof sv==="object"&&!Array.isArray(sv)){
          m[dk][sk]={...(m[dk][sk]||{})};
          Object.entries(sv).forEach(([siteId,siteData])=>{
            if(siteData&&typeof siteData==="object"&&!Array.isArray(siteData)){
              m[dk][sk][siteId]={...(m[dk][sk][siteId]||{})};
              Object.entries(siteData).forEach(([slot,slotData])=>{
                if(slotData&&typeof slotData==="object"&&!Array.isArray(slotData)){
                  m[dk][sk][siteId][slot]={...(m[dk][sk][siteId][slot]||{}),...slotData};
                }else{m[dk][sk][siteId][slot]=slotData}
              });
            }else{m[dk][sk][siteId]=siteData}
          });
        }else{m[dk][sk]=sv}
      });
    }else{m[dk]=rv}
  });
  return m;
}

function searchRef(query){
  if(!REF_DATA||!query||query.length<2)return[];
  const q=query.toLowerCase();
  return REF_DATA.sites.filter(s=>
    s.name.toLowerCase().includes(q)||
    s.caiso.toLowerCase().includes(q)||
    s.sub.toLowerCase().includes(q)||
    s.sap.toLowerCase().includes(q)||
    s.loc.toLowerCase().includes(q)
  ).slice(0,20);
}

function getRefForSite(siteName){
  if(!REF_DATA)return{};
  const q=siteName.toLowerCase();
  const site=REF_DATA.sites.find(s=>s.name.toLowerCase().includes(q));
  const rtc=Object.entries(REF_DATA.rtc||{}).find(([k])=>k.toLowerCase().includes(q));
  const nerc=Object.entries(REF_DATA.nerc||{}).find(([k])=>k.toLowerCase().includes(q));
  const tel=Object.entries(REF_DATA.telecom||{}).find(([k])=>k.toLowerCase().includes(q));
  const der=Object.entries(REF_DATA.derates||{}).find(([k])=>k.toLowerCase().includes(q));
  let ias=[];
  Object.entries(REF_DATA.ias||{}).forEach(([sec,procs])=>{
    if(sec.toLowerCase().includes(q)||q.includes(sec.toLowerCase().split(' ')[0]))
      ias=ias.concat(procs);
  });
  if(REF_DATA.ias&&REF_DATA.ias["GENERAL"])ias=ias.concat(REF_DATA.ias["GENERAL"]);
  return{site,rtc:rtc?.[1],nerc:nerc?.[1],telecom:tel?.[1],derate:der?.[1],ias};
}

// Check if a time slot should be expected given current hour and whether viewing a past day
function slotExpected(slotStr,h,viewingPast){
  if(viewingPast)return true;
  const sh=parseInt(slotStr)/100;
  if(h<6&&sh>=18)return true; // after midnight, late-night slots from "yesterday" are expected
  if(sh<=h)return true;
  return false;
}

function OutageCharts({data}){
  const outages=Array.isArray(data.outages)?data.outages:SEED_OUTAGES;
  const active=outages.filter(o=>o.status==="ACTIVE");
  const scheduled=outages.filter(o=>o.status==="SCHEDULED");
  const now=Date.now();
  const BarChart=({items,color,label,maxVal})=>{
    if(!items.length)return <div style={{padding:20,fontSize:11,color:C.dim,textAlign:"center"}}>No {label}</div>;
    const mx=maxVal||Math.max(...items.map(i=>i.val),1);
    return <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {items.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:160,fontSize:10,color:C.white,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
        <div style={{flex:1,height:24,background:C.bg,borderRadius:4,overflow:"hidden",position:"relative"}}>
          <div style={{width:Math.min(item.val/mx*100,100)+"%",height:"100%",background:typeof color==="function"?color(item):color,borderRadius:4,transition:"width .3s"}}/>
          <div style={{position:"absolute",right:6,top:4,fontSize:9,color:C.white,fontWeight:600}}>{item.label}</div>
        </div>
        {item.extra&&<div style={{fontSize:8,color:C.dim,width:60,textAlign:"right"}}>{item.extra}</div>}
      </div>)}
    </div>;
  };
  // Upcoming 72h - blue bars
  const startingSoon=scheduled.filter(o=>o.start>now&&o.start<now+72*3600000).sort((a,b)=>a.start-b.start).map(o=>{
    const hrs=Math.round((o.start-now)/3600000*10)/10;
    return{name:o.site,val:Math.max(72-hrs,1),label:hrs<1?Math.round(hrs*60)+"m":hrs.toFixed(1)+"h",extra:o.caiso||""};
  });
  // Closing within 24h - green bars
  const endingSoon=outages.filter(o=>o.status!=="RESOLVED"&&o.expectedEnd&&o.expectedEnd>now&&o.expectedEnd<now+24*3600000).sort((a,b)=>a.expectedEnd-b.expectedEnd).map(o=>{
    const hrs=Math.round((o.expectedEnd-now)/3600000*10)/10;
    return{name:o.site,val:Math.max(24-hrs,1),label:hrs<1?Math.round(hrs*60)+"m":hrs.toFixed(1)+"h",extra:o.outageId||""};
  });
  // All active - red for compliance/long, yellow for medium, green for short
  const currentActive=active.sort((a,b)=>(now-a.start)-(now-b.start)).reverse().map(o=>{
    const mins=Math.round((now-o.start)/60000);const hrs=mins/60;
    const label=hrs>=24?(hrs/24).toFixed(1)+"d":hrs>=1?hrs.toFixed(1)+"h":mins+"m";
    return{name:o.site,val:mins,label,hrs,extra:"P"+o.priority+(o.mw?" | "+o.mw+"MW":"")};
  });
  return <div>
    <div style={{fontSize:13,fontWeight:700,color:C.white,marginBottom:14}}>Outage Overview</div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      <div style={{padding:"6px 14px",background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.r}}>{active.length} Active</div>
      <div style={{padding:"6px 14px",background:C.y+"18",border:"1px solid "+C.y+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.y}}>{scheduled.length} Scheduled</div>
      <div style={{padding:"6px 14px",background:C.g+"18",border:"1px solid "+C.g+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.g}}>{outages.filter(o=>o.status==="RESOLVED").length} Resolved</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:14}}>
      <div style={{background:C.s,border:"1px solid "+C.b+"44",borderRadius:6,padding:16}}>
        <div style={{fontSize:10,color:C.b,textTransform:"uppercase",letterSpacing:2,marginBottom:10,fontWeight:700}}>Upcoming (Next 72h)</div>
        <BarChart items={startingSoon} color={C.b} label="upcoming outages"/>
      </div>
      <div style={{background:C.s,border:"1px solid "+C.g+"44",borderRadius:6,padding:16}}>
        <div style={{fontSize:10,color:C.g,textTransform:"uppercase",letterSpacing:2,marginBottom:10,fontWeight:700}}>Closing Soon (Within 24h)</div>
        <BarChart items={endingSoon} color={C.g} label="outages closing soon"/>
      </div>
      <div style={{background:C.s,border:"1px solid "+C.r+"44",borderRadius:6,padding:16}}>
        <div style={{fontSize:10,color:C.r,textTransform:"uppercase",letterSpacing:2,marginBottom:10,fontWeight:700}}>All Active Outages ({active.length})</div>
        <BarChart items={currentActive} color={item=>item.hrs>24?C.r:item.hrs>4?C.y:C.g} label="active outages"/>
      </div>
    </div>
  </div>;
}

    setOfflines(prev=>({...prev,[site]:{...prev[site],[field]:v}}));
  };

  const saveMatrix=()=>{
    onSave({avail_matrix:offlines});
  };

  const rows=AVAIL_MATRIX_SITES.map(s=>{
    const off=offlines[s.site]||{pvOff:0,essOff:0};
    const pvDerate=s.pvInvKw>0?(off.pvOff*s.pvInvKw/1000):0;
    const essDerate=s.essInvKw>0?(off.essOff*s.essInvKw/1000):0;
    const pvAvail=Math.max(s.pvCap/1000-pvDerate,0);
    const essAvail=Math.max(s.essCap/1000-essDerate,0);
    const pvPct=s.pvCap>0?Math.round(pvAvail/(s.pvCap/1000)*100):null;
    const essPct=s.essCap>0?Math.round(essAvail/(s.essCap/1000)*100):null;
    const hasDerate=off.pvOff>0||off.essOff>0;
    return{...s,off,pvDerate,essDerate,pvAvail,essAvail,pvPct,essPct,hasDerate};
  });

  const totalPvCap=rows.reduce((a,r)=>a+r.pvCap/1000,0);
  const totalEssCap=rows.reduce((a,r)=>a+r.essCap/1000,0);
  const totalPvAvail=rows.reduce((a,r)=>a+r.pvAvail,0);
  const totalEssAvail=rows.reduce((a,r)=>a+r.essAvail,0);
  const totalPvDerate=rows.reduce((a,r)=>a+r.pvDerate,0);
  const totalEssDerate=rows.reduce((a,r)=>a+r.essDerate,0);
  const deratedCount=rows.filter(r=>r.hasDerate).length;

  const filtered=rows.filter(r=>{
    if(!showAll&&!r.hasDerate)return false;
    if(filter&&!r.site.toLowerCase().includes(filter.toLowerCase()))return false;
    return true;
  });

  const thS={padding:"6px 6px",textAlign:"center",fontSize:8,color:C.dim,letterSpacing:1,borderBottom:"1px solid "+C.brd,textTransform:"uppercase",whiteSpace:"nowrap"};
  const tdS={padding:"5px 6px",fontSize:10,borderBottom:"1px solid "+C.brd,textAlign:"center"};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:13,fontWeight:700,color:C.white}}>Inverter Availability Matrix</div>
      <button onClick={saveMatrix} style={{padding:"6px 16px",background:C.g,color:C.bg,border:"none",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Save</button>
    </div>

    {/* Summary */}
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      <div style={{padding:"6px 14px",background:C.g+"18",border:"1px solid "+C.g+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.g}}>PV: {totalPvAvail.toFixed(0)} / {totalPvCap.toFixed(0)} MW</div>
      <div style={{padding:"6px 14px",background:C.b+"18",border:"1px solid "+C.b+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.b}}>ESS: {totalEssAvail.toFixed(0)} / {totalEssCap.toFixed(0)} MW</div>
      {totalPvDerate>0&&<div style={{padding:"6px 14px",background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.r}}>PV Derate: -{totalPvDerate.toFixed(1)} MW</div>}
      {totalEssDerate>0&&<div style={{padding:"6px 14px",background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:5,fontSize:11,fontWeight:700,color:C.r}}>ESS Derate: -{totalEssDerate.toFixed(1)} MW</div>}
      <div style={{padding:"6px 14px",background:deratedCount>0?C.y+"18":C.bg,border:"1px solid "+(deratedCount>0?C.y+"44":C.brd),borderRadius:5,fontSize:11,fontWeight:700,color:deratedCount>0?C.y:C.dim}}>{deratedCount} Sites Derated</div>
    </div>

    {/* Filters */}
    <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
      <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filter sites..." style={{padding:"6px 10px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:4,color:C.white,fontSize:10,fontFamily:ft,outline:"none",width:180}}/>
      <label style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.dim,cursor:"pointer"}}>
        <input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)} style={{width:13,height:13}}/>Show all sites
      </label>
    </div>

    {/* Table */}
    <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:900}}>
          <thead><tr>
            <th style={{...thS,textAlign:"left",paddingLeft:8}}>Site</th>
            <th style={thS}>PV Inv Off</th>
            <th style={thS}>ESS Inv Off</th>
            <th style={thS}>PV Cap MW</th>
            <th style={thS}>ESS Cap MW</th>
            <th style={thS}>PV Derate</th>
            <th style={thS}>ESS Derate</th>
            <th style={thS}>PV Avail</th>
            <th style={thS}>ESS Avail</th>
            <th style={thS}>PV %</th>
            <th style={thS}>ESS %</th>
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={11} style={{...tdS,color:C.dim,padding:20}}>No derated sites{!showAll?" (check 'Show all sites')":""}</td></tr>}
            {filtered.map(r=><tr key={r.site} style={{background:r.hasDerate?C.r+"08":"transparent"}}>
              <td style={{...tdS,textAlign:"left",paddingLeft:8,fontWeight:600,color:r.hasDerate?C.y:C.white}}>{r.site}</td>
              <td style={tdS}>{r.pvInvKw>0?<input type="number" min="0" value={r.off.pvOff||""} onChange={e=>setOff(r.site,"pvOff",e.target.value)} style={{width:40,padding:"2px 4px",background:C.inputBg,border:"1px solid "+(r.off.pvOff>0?C.r:C.brd),borderRadius:3,color:r.off.pvOff>0?C.r:C.white,fontSize:10,fontFamily:ft,textAlign:"center",outline:"none"}} placeholder="0"/>:<span style={{color:C.dim}}>-</span>}</td>
              <td style={tdS}>{r.essInvKw>0?<input type="number" min="0" value={r.off.essOff||""} onChange={e=>setOff(r.site,"essOff",e.target.value)} style={{width:40,padding:"2px 4px",background:C.inputBg,border:"1px solid "+(r.off.essOff>0?C.r:C.brd),borderRadius:3,color:r.off.essOff>0?C.r:C.white,fontSize:10,fontFamily:ft,textAlign:"center",outline:"none"}} placeholder="0"/>:<span style={{color:C.dim}}>-</span>}</td>
              <td style={{...tdS,color:C.dim}}>{r.pvCap>0?(r.pvCap/1000).toFixed(0):"-"}</td>
              <td style={{...tdS,color:C.dim}}>{r.essCap>0?(r.essCap/1000).toFixed(0):"-"}</td>
              <td style={{...tdS,color:r.pvDerate>0?C.r:C.dim}}>{r.pvDerate>0?"-"+r.pvDerate.toFixed(1):"-"}</td>
              <td style={{...tdS,color:r.essDerate>0?C.r:C.dim}}>{r.essDerate>0?"-"+r.essDerate.toFixed(1):"-"}</td>
              <td style={{...tdS,color:r.pvCap>0?C.g:C.dim,fontWeight:r.pvCap>0?600:400}}>{r.pvCap>0?r.pvAvail.toFixed(1):"-"}</td>
              <td style={{...tdS,color:r.essCap>0?C.g:C.dim,fontWeight:r.essCap>0?600:400}}>{r.essCap>0?r.essAvail.toFixed(1):"-"}</td>
              <td style={{...tdS,color:r.pvPct!==null?(r.pvPct<80?C.r:r.pvPct<95?C.y:C.g):C.dim,fontWeight:r.pvPct!==null?600:400}}>{r.pvPct!==null?r.pvPct+"%":"-"}</td>
              <td style={{...tdS,color:r.essPct!==null?(r.essPct<80?C.r:r.essPct<95?C.y:C.g):C.dim,fontWeight:r.essPct!==null?600:400}}>{r.essPct!==null?r.essPct+"%":"-"}</td>
            </tr>)}
          </tbody>
          {filtered.length>0&&<tfoot><tr style={{background:C.bg}}>
            <td style={{...tdS,textAlign:"left",paddingLeft:8,fontWeight:700,color:C.white}}>TOTAL</td>
            <td style={tdS}></td><td style={tdS}></td>
            <td style={{...tdS,fontWeight:600,color:C.dim}}>{totalPvCap.toFixed(0)}</td>
            <td style={{...tdS,fontWeight:600,color:C.dim}}>{totalEssCap.toFixed(0)}</td>
            <td style={{...tdS,fontWeight:600,color:totalPvDerate>0?C.r:C.dim}}>{totalPvDerate>0?"-"+totalPvDerate.toFixed(1):"-"}</td>
            <td style={{...tdS,fontWeight:600,color:totalEssDerate>0?C.r:C.dim}}>{totalEssDerate>0?"-"+totalEssDerate.toFixed(1):"-"}</td>
            <td style={{...tdS,fontWeight:700,color:C.g}}>{totalPvAvail.toFixed(0)}</td>
            <td style={{...tdS,fontWeight:700,color:C.g}}>{totalEssAvail.toFixed(0)}</td>
            <td style={{...tdS,fontWeight:600,color:C.g}}>{totalPvCap>0?Math.round(totalPvAvail/totalPvCap*1000*100)/100+"%":"-"}</td>
            <td style={{...tdS,fontWeight:600,color:C.g}}>{totalEssCap>0?Math.round(totalEssAvail/totalEssCap*1000*100)/100+"%":"-"}</td>
          </tr></tfoot>}
        </table>
      </div>
    </div>
  </div>;
}

function OutageTracker({data,user,onSave}){
  const [showForm,setShowForm]=useState(false);
  const [detail,setDetail]=useState(null);
  const [filter,setFilter]=useState("ACTIVE");
  const [typeFilter,setTypeFilter]=useState("");
  const rawOutages=Array.isArray(data.outages)?data.outages:[];
  const outages=rawOutages.length>0?rawOutages:SEED_OUTAGES;

  const active=outages.filter(o=>o.status==="ACTIVE");
  const scheduled=outages.filter(o=>o.status==="SCHEDULED");
  const now=Date.now();

  // Generate unique ID
  const genId=()=>"OUT-"+dkf(new Date())+"-"+String(outages.length+1).padStart(3,"0");

  const saveOutage=(outage)=>{
    const updated=[...outages];
    const idx=updated.findIndex(o=>o.id===outage.id);
    if(idx>=0)updated[idx]=outage;
    else updated.push(outage);
    onSave({outages:updated});
  };

  const resolveOutage=(id,notes)=>{
    const updated=outages.map(o=>o.id===id?{...o,status:"RESOLVED",actualEnd:Date.now(),updates:[...(o.updates||[]),{at:Date.now(),by:user.name,note:"RESOLVED: "+(notes||"Outage resolved")}]}:o);
    onSave({outages:updated});
    setDetail(null);
  };

  const addUpdate=(id,note)=>{
    const updated=outages.map(o=>o.id===id?{...o,updates:[...(o.updates||[]),{at:Date.now(),by:user.name,note}]}:o);
    onSave({outages:updated});
  };

  // Bar chart component
  const BarChart=({items,color,label,maxVal})=>{
    if(!items.length)return <div style={{padding:12,fontSize:11,color:C.dim,textAlign:"center"}}>No {label}</div>;
    const mx=maxVal||Math.max(...items.map(i=>i.val),1);
    return <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {items.slice(0,8).map((item,i)=><div key={i} onClick={()=>setDetail(item.outage)} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:120,fontSize:9,color:C.white,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
        <div style={{flex:1,height:18,background:C.bg,borderRadius:3,overflow:"hidden",position:"relative"}}>
          <div style={{width:Math.min(item.val/mx*100,100)+"%",height:"100%",background:typeof color==="function"?color(item):color,borderRadius:3,transition:"width .3s"}}/>
          <div style={{position:"absolute",right:4,top:2,fontSize:8,color:C.white}}>{item.label}</div>
        </div>
      </div>)}
    </div>;
  };

  // Prepare chart data
  const startingSoon=scheduled.filter(o=>o.start>now).sort((a,b)=>a.start-b.start).map(o=>{
    const hrs=Math.round((o.start-now)/3600000*10)/10;
    return {name:o.site,val:Math.max(48-hrs,1),label:hrs<1?Math.round(hrs*60)+"m":hrs.toFixed(1)+"h",outage:o};
  });

  const endingSoon=outages.filter(o=>o.status!=="RESOLVED"&&o.expectedEnd&&o.expectedEnd>now).sort((a,b)=>a.expectedEnd-b.expectedEnd).map(o=>{
    const hrs=Math.round((o.expectedEnd-now)/3600000*10)/10;
    return {name:o.site,val:Math.max(48-hrs,1),label:hrs<1?Math.round(hrs*60)+"m":hrs.toFixed(1)+"h",outage:o};
  });

  const currentActive=active.sort((a,b)=>(now-a.start)-(now-b.start)).reverse().map(o=>{
    const mins=Math.round((now-o.start)/60000);
    const hrs=mins/60;
    const label=hrs<1?mins+"m":hrs.toFixed(1)+"h";
    return {name:o.site,val:mins,label,outage:o,hrs};
  });

  // Outage Entry Form Modal
  const EntryForm=()=>{
    const [site,setSite]=useState("");
    const [siteSearch,setSiteSearch]=useState("");
    const [caiso,setCaiso]=useState("");
    const [type,setType]=useState("Forced");
    const [priority,setPriority]=useState(2);
    const [start,setStart]=useState(new Date().toISOString().slice(0,16));
    const [expectedEnd,setExpectedEnd]=useState("");
    const [mw,setMw]=useState("");
    const [desc,setDesc]=useState("");
    const [cause,setCause]=useState("");
    const [customCause,setCustomCause]=useState("");
    const [notifs,setNotifs]=useState({sc:false,top:false,field:false,asset:false,market:false});
    const causes=["Inverter Failure","Feeder Trip","GSU Trip","Comms Loss","Weather","Utility Switching","Maintenance","Other"];

    const siteResults=siteSearch.length>=2&&REF_DATA?REF_DATA.sites.filter(s=>s.name.toLowerCase().includes(siteSearch.toLowerCase())||s.caiso.toLowerCase().includes(siteSearch.toLowerCase())).slice(0,8):[];

    const selectSite=(s)=>{setSite(s.name);setCaiso(s.caiso);setSiteSearch(s.name)};

    const submit=()=>{
      if(!site)return;
      const outage={
        id:genId(),site,caiso,type,priority:parseInt(priority),
        start:new Date(start).getTime(),
        expectedEnd:expectedEnd?new Date(expectedEnd).getTime():null,
        actualEnd:null,mw:parseFloat(mw)||0,
        description:desc,cause:cause==="Other"?customCause:cause,
        notifications:notifs,operator:user.name,
        status:type==="Scheduled"&&new Date(start).getTime()>now?"SCHEDULED":"ACTIVE",
        updates:[]
      };
      saveOutage(outage);
      setShowForm(false);
    };

    const fld={width:"100%",padding:"8px 10px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:4,color:C.white,fontSize:11,fontFamily:ft,outline:"none"};
    const lbl={fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:2,marginBottom:4};

    return <div onClick={()=>setShowForm(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.s,border:"1px solid "+C.brd,borderRadius:8,padding:24,width:520,maxWidth:"95vw",maxHeight:"85vh",overflow:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:C.white}}>Log New Outage</div>
          <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",color:C.dim,fontSize:16,cursor:"pointer"}}>X</button>
        </div>

        <div style={{marginBottom:12}}>
          <div style={lbl}>Site *</div>
          <input value={siteSearch} onChange={e=>{setSiteSearch(e.target.value);setSite("")}} placeholder="Search site name or CAISO ID..." style={fld}/>
          {siteResults.length>0&&!site&&<div style={{background:C.s2,border:"1px solid "+C.brd,borderRadius:4,maxHeight:150,overflow:"auto",marginTop:2}}>
            {siteResults.map((s,i)=><div key={i} onClick={()=>selectSite(s)} style={{padding:"6px 10px",cursor:"pointer",fontSize:10,borderBottom:"1px solid "+C.brd}} onMouseEnter={e=>{e.currentTarget.style.background=C.bg}} onMouseLeave={e=>{e.currentTarget.style.background="transparent"}}>
              <span style={{color:C.white}}>{s.name}</span>{s.caiso&&<span style={{color:C.b,marginLeft:8}}>{s.caiso}</span>}
            </div>)}
          </div>}
          {caiso&&<div style={{fontSize:9,color:C.b,marginTop:4}}>CAISO: {caiso}</div>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><div style={lbl}>Type</div>
            <select value={type} onChange={e=>setType(e.target.value)} style={fld}>
              <option>Forced</option><option>Scheduled</option><option>Curtailment</option><option>Derate</option>
            </select></div>
          <div><div style={lbl}>Priority</div>
            <select value={priority} onChange={e=>setPriority(e.target.value)} style={fld}>
              <option value={1}>1 - Critical</option><option value={2}>2 - High</option><option value={3}>3 - Low</option><option value={4}>4 - Info</option>
            </select></div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><div style={lbl}>Start Time</div><input type="datetime-local" value={start} onChange={e=>setStart(e.target.value)} style={fld}/></div>
          <div><div style={lbl}>Expected End</div><input type="datetime-local" value={expectedEnd} onChange={e=>setExpectedEnd(e.target.value)} style={fld}/></div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><div style={lbl}>MW Impact</div><input type="number" value={mw} onChange={e=>setMw(e.target.value)} placeholder="0" style={fld}/></div>
          <div><div style={lbl}>Cause</div>
            <select value={cause} onChange={e=>setCause(e.target.value)} style={fld}>
              <option value="">Select...</option>{causes.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        {cause==="Other"&&<div style={{marginBottom:12}}><input value={customCause} onChange={e=>setCustomCause(e.target.value)} placeholder="Describe cause..." style={fld}/></div>}

        <div style={{marginBottom:12}}>
          <div style={lbl}>Description</div>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder="What happened..." style={{...fld,resize:"vertical"}}/>
        </div>

        <div style={{marginBottom:16}}>
          <div style={lbl}>Notifications Sent</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {[["sc","Sched. Coord."],["top","Trans. Operator"],["field","O&M Field"],["asset","Asset Mgmt"],["market","Market Ops"]].map(([k,l])=>
              <label key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.white,cursor:"pointer"}}>
                <input type="checkbox" checked={notifs[k]} onChange={e=>setNotifs({...notifs,[k]:e.target.checked})} style={{width:13,height:13}}/>{l}
              </label>
            )}
          </div>
        </div>

        <button onClick={submit} disabled={!site} style={{width:"100%",padding:"10px 0",background:site?C.g:C.brd,color:site?C.bg:C.dim,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:site?"pointer":"not-allowed"}}>Log Outage</button>
      </div>
    </div>;
  };

  // Outage Detail Modal
  const DetailView=({outage})=>{
    const [updateNote,setUpdateNote]=useState("");
    const [resolveNote,setResolveNote]=useState("");
    const [showResolve,setShowResolve]=useState(false);
    const dur=outage.actualEnd?(outage.actualEnd-outage.start):(now-outage.start);
    const durH=(dur/3600000).toFixed(1);
    const ref=REF_DATA?getRefForSite(outage.site):{};
    return <div onClick={()=>setDetail(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.s,border:"1px solid "+C.brd,borderRadius:8,padding:24,width:520,maxWidth:"95vw",maxHeight:"85vh",overflow:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:C.white}}>{outage.site}</div>
            <div style={{fontSize:9,color:C.b}}>{outage.caiso} | {outage.id}</div>
          </div>
          <button onClick={()=>setDetail(null)} style={{background:"none",border:"none",color:C.dim,fontSize:16,cursor:"pointer"}}>X</button>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          <span style={{fontSize:9,padding:"3px 8px",borderRadius:3,background:outage.status==="ACTIVE"?C.r+"33":outage.status==="SCHEDULED"?C.y+"33":C.g+"33",color:outage.status==="ACTIVE"?C.r:outage.status==="SCHEDULED"?C.y:C.g,fontWeight:700}}>{outage.status}</span>
          <span style={{fontSize:9,padding:"3px 8px",borderRadius:3,background:C.b+"22",color:C.b}}>{outage.type}</span>
          <span style={{fontSize:9,padding:"3px 8px",borderRadius:3,background:outage.priority<=2?C.r+"22":C.y+"22",color:outage.priority<=2?C.r:C.y}}>P{outage.priority}</span>
          <span style={{fontSize:9,padding:"3px 8px",borderRadius:3,background:C.bg,color:C.dim}}>{durH}h</span>
          {outage.mw>0&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:3,background:C.o+"22",color:C.o}}>{outage.mw} MW</span>}
        </div>

        <div style={{fontSize:11,color:C.white,marginBottom:6}}>{outage.description}</div>
        <div style={{fontSize:10,color:C.dim,marginBottom:12}}>Cause: {outage.cause} | By: {outage.operator} | Start: {new Date(outage.start).toLocaleString()}</div>

        {ref.rtc&&<div style={{background:C.bg,borderRadius:4,padding:8,marginBottom:12,fontSize:10}}>
          <div style={{color:C.dim,marginBottom:4}}>QUICK CONTACTS</div>
          <div style={{color:C.y}}>SC: {ref.rtc.sc}</div>
          <div style={{color:C.b}}>TO: {ref.rtc.to}</div>
        </div>}

        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Timeline</div>
          {(outage.updates||[]).map((u,i)=><div key={i} style={{borderLeft:"2px solid "+C.brd,paddingLeft:10,marginBottom:6}}>
            <div style={{fontSize:9,color:C.dim}}>{new Date(u.at).toLocaleString()} - {u.by}</div>
            <div style={{fontSize:10,color:C.white}}>{u.note}</div>
          </div>)}
          {(!outage.updates||!outage.updates.length)&&<div style={{fontSize:10,color:C.dim}}>No updates yet</div>}

      </div>

      <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,padding:12}}>
        <div style={{fontSize:9,color:C.b,textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:700}}>Scheduled - Starting Soon</div>
        <BarChart items={startingSoon} color={C.b} label="scheduled outages"/>
      </div>
      <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,padding:12}}>
        <div style={{fontSize:9,color:C.g,textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:700}}>Ending Soon</div>
        <BarChart items={endingSoon} color={C.g} label="outages ending soon"/>

      <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,padding:12}}>

        <BarChart items={currentActive} color={item=>item.hrs>24?C.r:item.hrs>4?C.y:C.g} label="active outages"/>

    {/* Filters */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      {["","ACTIVE","SCHEDULED","RESOLVED"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"4px 10px",background:filter===f?(f==="ACTIVE"?C.r:f==="SCHEDULED"?C.y:f==="RESOLVED"?C.g:C.b)+"22":"transparent",border:"1px solid "+(filter===f?(f==="ACTIVE"?C.r:f==="SCHEDULED"?C.y:f==="RESOLVED"?C.g:C.b):C.brd),borderRadius:4,color:filter===f?(f==="ACTIVE"?C.r:f==="SCHEDULED"?C.y:f==="RESOLVED"?C.g:C.b):C.dim,fontSize:9,fontFamily:ft,cursor:"pointer",fontWeight:filter===f?700:400}}>{f||"All"}</button>)}
      <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{padding:"4px 8px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:4,color:C.white,fontSize:9,fontFamily:ft,outline:"none"}}>
        <option value="">All Types</option><option>Forced</option><option>Scheduled</option><option>Curtailment</option><option>Derate</option>
      </select>
    </div>

    {/* Outages Table */}
    <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:800}}>
          <thead><tr>
            <th style={thS}>Site</th><th style={thS}>Type</th><th style={thS}>Pri</th><th style={thS}>Start</th><th style={thS}>Duration</th><th style={thS}>MW</th><th style={thS}>SC</th><th style={thS}>TOP</th><th style={thS}>Status</th>
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={9} style={{...tdS,textAlign:"center",color:C.dim,padding:20}}>No outages found</td></tr>}
            {filtered.map(o=>{
              const dur=o.actualEnd?(o.actualEnd-o.start):(now-o.start);
              const durH=(dur/3600000).toFixed(1);
              return <tr key={o.id} onClick={()=>setDetail(o)} style={{cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.background=C.bg}} onMouseLeave={e=>{e.currentTarget.style.background="transparent"}}>
                <td style={tdS}><div style={{fontWeight:600}}>{o.site}</div><div style={{fontSize:8,color:C.b}}>{o.caiso}</div></td>
                <td style={tdS}>{o.type}</td>
                <td style={{...tdS,color:o.priority<=2?C.r:C.y,fontWeight:700}}>P{o.priority}</td>
                <td style={{...tdS,fontSize:9}}>{new Date(o.start).toLocaleString()}</td>
                <td style={tdS}>{durH}h</td>

                <td style={tdS}>{o.notifications?.sc?<span style={{color:C.g}}>Y</span>:<span style={{color:C.r}}>N</span>}</td>
                <td style={tdS}>{o.notifications?.top?<span style={{color:C.g}}>Y</span>:<span style={{color:C.r}}>N</span>}</td>
                <td style={tdS}><span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:o.status==="ACTIVE"?C.r+"33":o.status==="SCHEDULED"?C.y+"33":C.g+"33",color:o.status==="ACTIVE"?C.r:o.status==="SCHEDULED"?C.y:C.g,fontWeight:700}}>{o.status}</span></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>

    {showForm&&<EntryForm/>}
    {detail&&<DetailView outage={detail}/>}
  </div>;
}

// Sparkline SVG chart
function Spark({vals,labels,w:width,h:height,min:forceMin,max:forceMax,thresholds,showArea,showDots}){
  const W=width||200,H=height||50,pad=4;
  const pts=vals.map((v,i)=>({v,i,label:labels?labels[i]:""})).filter(p=>p.v!=null);
  if(pts.length<2)return <svg width={W} height={H}><text x={W/2} y={H/2+3} textAnchor="middle" fill={C.dim} fontSize={9} fontFamily={ft}>No data</text></svg>;
  const mn=forceMin!=null?forceMin:Math.min(...pts.map(p=>p.v));
  const mx=forceMax!=null?forceMax:Math.max(...pts.map(p=>p.v));
  const range=mx-mn||1;
  const xStep=(W-pad*2)/(vals.length-1);
  const yOf=v=>pad+(1-(v-mn)/range)*(H-pad*2);
  const coords=pts.map(p=>({x:pad+p.i*xStep,y:yOf(p.v),v:p.v,label:p.label}));
  const line=coords.map((c,i)=>(i===0?"M":"L")+c.x.toFixed(1)+","+c.y.toFixed(1)).join(" ");
  const area=line+" L"+coords[coords.length-1].x.toFixed(1)+","+(H-pad)+" L"+coords[0].x.toFixed(1)+","+(H-pad)+" Z";
  // Threshold zones
  const zones=[];
  if(thresholds){
    thresholds.forEach(t=>{
      const y1=t.max!=null?yOf(Math.min(t.max,mx)):pad;
      const y2=t.min!=null?yOf(Math.max(t.min,mn)):H-pad;
      if(y2>y1)zones.push(<rect key={t.color} x={pad} y={y1} width={W-pad*2} height={y2-y1} fill={t.color} opacity={0.08} rx={2}/>);
    });
  }
  const lineColor=coords[coords.length-1].v>=80?C.g:coords[coords.length-1].v>=50?C.y:coords[coords.length-1].v>=20?C.o:C.r;
  return(
    <svg width={W} height={H} style={{display:"block"}}>
      {zones}
      {showArea&&<path d={area} fill={lineColor} opacity={0.1}/>}
      <path d={line} fill="none" stroke={lineColor} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
      {showDots!==false&&coords.map((c,i)=>{
        const col=c.v>=80?C.g:c.v>=50?C.y:c.v>=20?C.o:C.r;
        return <circle key={i} cx={c.x} cy={c.y} r={2.5} fill={col} stroke={C.s} strokeWidth={1}>
          <title>{c.label?c.label+": ":""}{c.v}%</title>
        </circle>;
      })}
    </svg>
  );
}

function ShiftNotes({notes,user,onSaveNote}){
  const [draft,setDraft]=useState("");
  const inputRef=useRef(null);
  const addNote=()=>{
    if(!draft.trim())return;
    onSaveNote({text:draft.trim(),user:user.name,role:user.role,ts:Date.now()});
    setDraft("");
    setTimeout(()=>inputRef.current?.focus(),50);
  };
  return(<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <input ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addNote()}}}
        placeholder="Add a note (handoff info, issues, reminders...)"
        style={{flex:1,padding:"8px 12px",background:C.bg,border:"1px solid "+C.brd,borderRadius:5,color:C.white,fontSize:12,fontFamily:ft,outline:"none"}}
      />
      <button onClick={addNote} disabled={!draft.trim()}
        style={{padding:"8px 18px",background:draft.trim()?C.y:C.brd,color:draft.trim()?C.bg:C.dim,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:draft.trim()?"pointer":"not-allowed",letterSpacing:1,whiteSpace:"nowrap"}}>Add Note</button>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:250,overflowY:"auto"}}>{notes.slice().reverse().map((n,i)=>
      <div key={i} style={{background:C.bg,border:"1px solid "+C.brd,borderRadius:5,padding:"8px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div><span style={{fontSize:11,fontWeight:700,color:C.g}}>{n.user}</span><span style={{fontSize:9,color:C.dim,marginLeft:6}}>{n.role}</span></div>

        </div>
        <div style={{fontSize:12,color:C.white,lineHeight:"1.4"}}>{n.text}</div>

  </div>);

// ================================================================
function Dashboard({data,dayKey:dkv,user,onSaveNote,onRemoveShift}){
  const dd=data[dkv]||{};
  const avail=dd.bess_avail||{};
  const subs=dd.subs||{};
  const shifts=dd.shifts||[];
  const h=curHr();
  const viewingPast=dkv<dkf(new Date());

  // Alerts
  const alerts=[];
  BESS_SITES.forEach(site=>{
    const sd=avail[site.id]||{};let lnc=null,lsl=null;
    AVAIL_SLOTS.forEach(sl=>{if(sd[sl]?.nc!=null&&sd[sl].nc!==""){lnc=parseFloat(sd[sl].nc);lsl=sl}});
    if(lnc!=null&&lnc<=site.out)alerts.push({site:site.n,nc:lnc,max:site.max,out:site.out,slot:lsl});
  });

  // SOC heatmap (BESS sites + Bellefield/Rexford from split site_bess sections)
  const sbBell=dd.sbess_bell||{};
  const sbRex=dd.sbess_rex||{};
  const siteBess={...(dd.site_bess||{}),...sbBell,...sbRex};
  const socData=BESS_SITES.map(site=>{
    const sd=avail[site.id]||{};
    const vals=AVAIL_SLOTS.map(sl=>{const v=sd[sl]?.soc;return v!=null&&v!==""?parseFloat(v):null});
    const lat=vals.filter(v=>v!=null);
    return{site:site.n,id:site.id,vals,latest:lat.length?lat[lat.length-1]:null,slots:AVAIL_SLOTS,slotLabels:AVAIL_LBL};
  });
  // Add Bellefield & Rexford from split Site BESS sections
  VVAR_SITES.forEach(site=>{
    const sd=siteBess[site.id]||{};
    const vals=SBESS_SLOTS.map(sl=>{const v=sd[sl]?.soc;return v!=null&&v!==""?parseFloat(v):null});
    const lat=vals.filter(v=>v!=null);
    socData.push({site:site.n,id:site.id,vals,latest:lat.length?lat[lat.length-1]:null,slots:SBESS_SLOTS,slotLabels:SBESS_LBL,isSiteBess:true});
  });

  // Missing
  const eAS=AVAIL_SLOTS.filter(sl=>slotExpected(sl,h,viewingPast));
  const missingAvail=[];
  BESS_SITES.forEach(site=>{const sd=avail[site.id]||{};eAS.forEach(sl=>{if(!sd[sl]||sd[sl].nc==null||sd[sl].nc==="")missingAvail.push({site:site.n,slot:AVAIL_LBL[AVAIL_SLOTS.indexOf(sl)]})})});
  const eSS=SUB_SLOTS.filter(sl=>slotExpected(sl,h,viewingPast));
  const missingSubs=[];
  SUB_SITES.forEach(site=>{const sd=subs[site.id]||{};eSS.forEach(sl=>{if(!sd[sl]||!sd[sl].sat||sd[sl].sat==="")missingSubs.push({site:site.n,slot:SUB_LBL[SUB_SLOTS.indexOf(sl)]})})});

  // Node trend (BESS sites + Bellefield/Rexford)
  const nodeTrend=BESS_SITES.map(site=>{const sd=avail[site.id]||{};return{site:site.n,max:site.max,out:site.out,vals:AVAIL_SLOTS.map(sl=>{const v=sd[sl]?.nc;return v!=null&&v!==""?parseFloat(v):null}),slots:AVAIL_SLOTS,slotLabels:AVAIL_LBL}});
  VVAR_SITES.forEach(site=>{
    const sd=siteBess[site.id]||{};
    const vals=SBESS_SLOTS.map(sl=>{const v=sd[sl]?.nc;return v!=null&&v!==""?parseFloat(v):null});
    nodeTrend.push({site:site.n,max:null,out:null,vals,slots:SBESS_SLOTS,slotLabels:SBESS_LBL,isSiteBess:true});
  });

  // Completion
  const compSecs=[
    {name:"BESS Avail",key:"bess_avail",sites:BESS_SITES,slots:AVAIL_SLOTS,fields:["nc","soc"]},
    {name:"BESS Ctrl",key:"bess_ctrl",sites:BESS_SITES,slots:CTRL_SLOTS,fields:["vvar","ads"]},
    {name:"CA Beacon",key:"ca_beacon",sites:CAPV_BEACONS,slots:CAPV_SLOTS,fields:["pf"]},
    {name:"CA Big Sky",key:"ca_bigsky",sites:CAPV_BIGSKY,slots:CAPV_SLOTS,fields:["vars"]},
    {name:"Substations",key:"subs",sites:SUB_SITES,slots:SUB_SLOTS,fields:["sat"]},
  ];
  const completion=compSecs.map(sec=>{
    const sd=dd[sec.key]||{};let total=0,filled=0;
    const eSl=sec.slots.filter(sl=>slotExpected(sl,h,viewingPast));
    sec.sites.forEach(site=>{eSl.forEach(sl=>{sec.fields.forEach(f=>{total++;if(sd[site.id]?.[sl]?.[f]!=null&&sd[site.id][sl][f]!=="")filled++})})});
    return{name:sec.name,total,filled,pct:pct(filled,total)};
  });
  const tAll=completion.reduce((a,c)=>a+c.total,0);
  const fAll=completion.reduce((a,c)=>a+c.filled,0);

  // Outage log
  const outageLog=[];
  BESS_SITES.forEach(site=>{const sd=avail[site.id]||{};AVAIL_SLOTS.forEach((sl,i)=>{const nc=sd[sl]?.nc;if(nc!=null&&nc!==""&&parseFloat(nc)<=site.out)outageLog.push({site:site.n,slot:AVAIL_LBL[i],nc:parseFloat(nc),out:site.out,max:site.max,user:sd[sl]._user||"--"})})});

  // Sub completion
  const subComp=SUB_SITES.map(site=>{const sd=subs[site.id]||{};const done=SUB_SLOTS.filter(sl=>sd[sl]?.sat&&sd[sl].sat!=="").length;return{site:site.n,done,total:SUB_SLOTS.length,pct:pct(done,SUB_SLOTS.length)}});

  // Activity log: who entered what, when
  const activity=[];
  SECTIONS.forEach(sec=>{
    const sd=dd[sec.id]||{};
    sec.sites.forEach(site=>{
      sec.slots.forEach((sl,si)=>{
        const slotData=sd[site.id]?.[sl];
        if(slotData&&slotData._user){
          activity.push({section:sec.label,site:site.n,slot:sec.slotLabels[si],user:slotData._user,ts:slotData._ts,color:sec.color});
        }
      });
    });
  });
  activity.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const socColor=v=>{if(v==null)return C.dim+"33";if(v>=80)return C.g;if(v>=50)return C.y;if(v>=20)return C.o;return C.r};

  const heatCell=(v,colorFn)=><div style={{width:28,height:22,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",background:v!=null?colorFn(v)+"22":"transparent",border:"1px solid "+(v!=null?colorFn(v)+"44":C.brd+"44"),fontSize:9,fontWeight:v!=null?600:400,color:v!=null?colorFn(v):C.dim+"44",margin:"0 auto"}}>{v!=null?v:"--"}</div>;

  const thS={padding:"4px 8px",textAlign:"left",fontSize:8,color:C.dim,letterSpacing:2,borderBottom:"1px solid "+C.brd,textTransform:"uppercase"};
  const thC={padding:"4px 3px",textAlign:"center",fontSize:8,color:C.dim,borderBottom:"1px solid "+C.brd};

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      {/* Alerts */}
      <Box><SH color={alerts.length?C.r:C.g}>{alerts.length?alerts.length+" OUTAGE ALERT"+(alerts.length>1?"S":""):"\u2713 ALL SITES NOMINAL"}</SH>
        {alerts.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{alerts.map((a,i)=>
          <div key={i} style={{background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:4,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:12,fontWeight:700,color:C.r}}>{a.site}</div><div style={{fontSize:9,color:C.dim}}>at {AVAIL_LBL[AVAIL_SLOTS.indexOf(a.slot)]}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:C.r}}>{a.nc}<span style={{fontSize:10,fontWeight:400}}>/{a.max}</span></div><div style={{fontSize:8,color:C.r}}>OUTAGE {"\u2264"}{a.out}</div></div>
          </div>)}</div>
        :<div style={{fontSize:11,color:C.g}}>All BESS sites above outage thresholds</div>}
      </Box>

      {/* Shift */}
      <Box><SH>Shift Handoff</SH>
        {shifts.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{shifts.map((s,i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:C.bg,borderRadius:4,border:"1px solid "+(s.name===user.name?C.g+"66":C.brd)}}>
            <div><div style={{fontSize:12,fontWeight:600,color:s.name===user.name?C.g:C.white}}>{s.name}</div><div style={{fontSize:9,color:C.dim}}>{s.role}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{textAlign:"right"}}><div style={{fontSize:11,color:s.shift==="Day"?C.y:C.b,fontWeight:600}}>{s.shift}</div><div style={{fontSize:9,color:C.dim}}>{fT(s.loginTime)}</div></div>
              <button onClick={()=>onRemoveShift&&onRemoveShift(i)} style={{background:"none",border:"none",color:C.dim,fontSize:12,cursor:"pointer",padding:"0 2px",lineHeight:1}} title="Remove from list">x</button>
            </div>
          </div>)}</div>
        :<div style={{fontSize:11,color:C.dim}}>No operators yet</div>}
        <div style={{marginTop:8,fontSize:9,color:C.dim,borderTop:"1px solid "+C.brd,paddingTop:6}}>Current: <span style={{color:h>=6&&h<18?C.y:C.b,fontWeight:600}}>{h>=6&&h<18?"Day":"Night"} Shift</span></div>
      </Box>

      {/* Completion */}
      <Box><SH>Overall Completion</SH>
        <div style={{textAlign:"center",marginBottom:10}}>
          <div style={{fontSize:32,fontWeight:700,color:pct(fAll,tAll)>=90?C.g:pct(fAll,tAll)>=60?C.y:C.r}}>{pct(fAll,tAll)}%</div>
          <div style={{fontSize:9,color:C.dim}}>{fAll}/{tAll} readings</div></div>
        <Bar pct={pct(fAll,tAll)} color={pct(fAll,tAll)>=90?C.g:pct(fAll,tAll)>=60?C.y:C.r} h={8}/>
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4}}>{completion.map(c=>

      {/* BESS Control Summary */}
      {(()=>{const sd=dd.bess_ctrl||{};const rows=BESS_SITES.map(site=>{let lat={};CTRL_SLOTS.forEach(sl=>{if(sd[site.id]?.[sl])lat=sd[site.id][sl]});return{site:site.n,vvar:lat.vvar||"--",ads:lat.ads||"--",pmax:lat.pmax||"--",emax:lat.emax||"--"}});

              <td style={{padding:"4px 8px",fontSize:10,color:r.pmax==="--"?C.dim:C.p,fontWeight:600}}>{r.pmax}</td>

          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 200px"}}><div style={{fontSize:9,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Beacon - PF / Curt</div>
              {bRows.map(r=><div key={r.site} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>

      {/* V/VAR + Site BESS Summary */}
      {(()=>{const vsd={...(dd.vvar_checks||{}),...(dd.vvar_bell||{}),...(dd.vvar_rex||{})};const bsd={...(dd.site_bess||{}),...(dd.sbess_bell||{}),...(dd.sbess_rex||{})};
        return <Box><SH color={C.p}>V/VAR + Site BESS (Latest)</SH>
          {VVAR_SITES.map(site=>{
            let vlat={};VVAR_SLOTS.forEach(sl=>{if(vsd[site.id]?.[sl])vlat=vsd[site.id][sl]});
            let blat={};SBESS_SLOTS.forEach(sl=>{if(bsd[site.id]?.[sl])blat=bsd[site.id][sl]});
            return <div key={site.id} style={{marginBottom:10,padding:"8px 10px",background:C.bg,borderRadius:5,border:"1px solid "+C.brd}}>
              <div style={{fontSize:11,fontWeight:700,color:C.white,marginBottom:6}}>{site.n}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,fontSize:9}}>
                <div><span style={{color:C.dim}}>Volt:</span> <span style={{color:C.g,fontWeight:600}}>{vlat.volt||"--"}</span></div>
                <div><span style={{color:C.dim}}>MVAR:</span> <span style={{color:C.y,fontWeight:600}}>{vlat.mvar||"--"}</span></div>
                <div><span style={{color:C.dim}}>ADS:</span> <span style={{color:C.b,fontWeight:600}}>{vlat.ads||"--"}</span></div>
                <div><span style={{color:C.dim}}>#N/C:</span> <span style={{color:C.g,fontWeight:600}}>{blat.nc||"--"}</span></div>

                <div><span style={{color:C.dim}}>#INV:</span> <span style={{color:C.p,fontWeight:600}}>{blat.inv||"--"}</span></div>
              </div>
            </div>})}
        </Box>})()}

      {/* AZ + MCF PV + Road Runner / Kauai */}
      {(()=>{const azd=dd.rando_az||{};const msd=dd.rando_mcf||{};const rsd=dd.rando_misc||{};
        return <Box span="span 2"><SH color={C.r}>AZ / MCF PV / Road Runner / Kauai (Latest)</SH>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 140px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>AZ Sites - VARs</div>
              {RANDO_AZ.map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(azd[site.id]?.[sl])lat=azd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:10,color:C.white}}>{site.n}</span>
                  <span style={{fontSize:10,color:lat.vars?C.g:C.dim,fontWeight:600}}>{lat.vars||"--"}</span>
                </div>})}</div>
            <div style={{flex:"1 1 160px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>MCF PV - MVAR / ADS</div>
              {RANDO_MCF.map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(msd[site.id]?.[sl])lat=msd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:10,color:C.white}}>{site.n}</span>
                  <span><span style={{fontSize:10,color:lat.mvar?C.y:C.dim,fontWeight:600,marginRight:8}}>{lat.mvar||"--"}</span><span style={{fontSize:10,color:lat.ads?C.b:C.dim,fontWeight:600}}>{lat.ads||"--"}</span></span>
                </div>})}</div>
            <div style={{flex:"2 1 260px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Road Runner / Kauai</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 16px"}}>
              {[...RANDO_RR,...RANDO_KAUAI].map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(rsd[site.id]?.[sl])lat=rsd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:9,color:C.white,whiteSpace:"nowrap"}}>{site.n}</span>
                  <span style={{fontSize:10,color:lat.val?C.g:C.dim,fontWeight:600}}>{lat.val||"--"}</span>
                </div>})}</div></div>
          </div></Box>})()}

      {/* Outage Log */}
      <Box span="span 3"><SH color={outageLog.length?C.r:C.g}>Outage Event Log {outageLog.length>0&&"("+outageLog.length+" events)"}</SH>
        {outageLog.length===0?<div style={{fontSize:11,color:C.g}}>No outage events today</div>:
        <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
          <thead><tr>{["Site","Time","# N/C","Threshold","Max","Logged By"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd}}>{h}</th>)}</tr></thead>
          <tbody>{outageLog.map((e,i)=><tr key={i} style={{borderBottom:"1px solid "+C.brd}}>
            <td style={{padding:"6px 10px",fontWeight:700,color:C.r}}>{e.site}</td>
            <td style={{padding:"6px 10px",color:C.txt}}>{e.slot}</td>
            <td style={{padding:"6px 10px",color:C.r,fontWeight:700,fontSize:14}}>{e.nc}</td>
            <td style={{padding:"6px 10px",color:C.y}}>{"\u2264"} {e.out}</td>
            <td style={{padding:"6px 10px",color:C.dim}}>{e.max}</td>
            <td style={{padding:"6px 10px",color:C.dim}}>{e.user}</td>
          </tr>)}</tbody>
        </table></div>}
      </Box>

      {/* Shift Notes */}
      <Box span="span 3">
        <SH color={C.y}>Shift Notes</SH>
        <ShiftNotes notes={dd.notes||[]} user={user} onSaveNote={onSaveNote}/>
      </Box>

      {/* VAR-002 Compliance */}
      {(()=>{
        const vs=data[dkv]?.var002_status||data.var002_status||{};
        const oosCount=Object.values(vs).filter(v=>v.status==="OUT OF SERVICE").length;
        const pendCount=Object.values(vs).filter(v=>v.status==="OUT OF SERVICE"&&!v.topNotified).length;
        const longOos=Object.entries(vs).filter(([k,v])=>v.status==="OUT OF SERVICE"&&v.changedAt&&(Date.now()-v.changedAt)>24*60*60*1000);
        if(oosCount===0)return <Box><SH color={C.g}>VAR-002: ALL AVR IN SERVICE</SH></Box>;
        return <Box><SH color={C.r}>VAR-002: {oosCount} AVR OUT OF SERVICE</SH>
          {pendCount>0&&<div style={{background:C.y+"18",border:"1px solid "+C.y+"44",borderRadius:4,padding:"6px 10px",marginBottom:6,fontSize:11,color:C.y}}>WARNING: {pendCount} site(s) - TOP NOT YET NOTIFIED</div>}
          {longOos.map(([site,v])=><div key={site} style={{background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:4,padding:"6px 10px",marginBottom:4,fontSize:11}}><span style={{color:C.r,fontWeight:700}}>{site}</span><span style={{color:C.dim}}> OOS &gt;24h since {new Date(v.changedAt).toLocaleString()}</span></div>)}
        </Box>;
      })()}

      {/* Active Outages */}
      {(()=>{
        const outs=Array.isArray(data.outages)?data.outages.filter(o=>o.status==="ACTIVE"):[];
        if(outs.length===0)return null;
        const top3=outs.sort((a,b)=>a.priority-b.priority).slice(0,3);
        return <Box><SH color={C.r}>{outs.length} ACTIVE OUTAGE{outs.length>1?"S":""}</SH>
          {top3.map((o,i)=><div key={i} style={{background:C.r+"12",border:"1px solid "+C.r+"33",borderRadius:4,padding:"6px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:11,fontWeight:600,color:C.r}}>{o.site}</div><div style={{fontSize:9,color:C.dim}}>{o.type} | P{o.priority} | {o.cause||"Unknown"}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,fontWeight:700,color:C.white}}>{o.mw?o.mw+" MW":""}</div><div style={{fontSize:8,color:C.dim}}>{((Date.now()-o.start)/3600000).toFixed(1)}h</div></div>
          </div>)}
        </Box>;
      })()}

      {/* Activity Log */}
      <Box span="span 3"><SH color={C.b}>Activity Log - Who Entered What ({activity.length} entries)</SH>
        {activity.length===0?<div style={{fontSize:11,color:C.dim}}>No data entries yet today</div>:
        <div style={{overflowX:"auto",maxHeight:300,overflowY:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
          <thead style={{position:"sticky",top:0,zIndex:1}}><tr>{["Operator","Section","Site","Time Slot","Logged At"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd,background:C.s}}>{h}</th>)}</tr></thead>
          <tbody>{activity.slice(0,100).map((e,i)=><tr key={i} style={{borderBottom:"1px solid "+C.brd}}>
            <td style={{padding:"5px 10px",fontWeight:700,color:C.g}}>{e.user}</td>
            <td style={{padding:"5px 10px",color:e.color}}>{e.section}</td>
            <td style={{padding:"5px 10px",color:C.white}}>{e.site}</td>
            <td style={{padding:"5px 10px",color:C.txt}}>{e.slot}</td>
            <td style={{padding:"5px 10px",color:C.dim}}>{e.ts?new Date(e.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</td>
          </tr>)}</tbody>
        </table></div>}
      </Box>
    </div>
  );
}

// FAST GRID (input does NOT reset on background sync)
// ================================================================
function FastGrid({sectionKey,sites,slots,slotLabels,fields,data,dayKey:dkv,onSave,user,siteExtra}){
  const refs=useRef({});
  const dayData=data[dkv]?.[sectionKey]||{};
  const isToday=dkv===dkf(new Date());
  // Find the current active slot: the slot whose hour we're currently in or just passed
  const nowSlot=(()=>{
    if(!isToday)return null;
    const h=curHr();
    let best=null;
    for(let i=slots.length-1;i>=0;i--){
      const sh=parseInt(slots[i])/100;
      if(sh<=h){best=slots[i];break}
    }
    // Handle overnight: if early morning (h<6) and slots have late-night ones
    if(!best&&h<6){for(let i=slots.length-1;i>=0;i--){const sh=parseInt(slots[i])/100;if(sh>=18){best=slots[i];break}}}
    return best;
  })();

  const buildRows=()=>sites.map(s=>{
    const r={id:s.id,slots:{}};
    slots.forEach(sl=>{r.slots[sl]={};fields.forEach(f=>{r.slots[sl][f.id]=dayData[s.id]?.[sl]?.[f.id]??""})});
    return r;
  });

  const [rows,setRows]=useState(buildRows);
  const [localEdits,setLocalEdits]=useState({});

  // Rebuild rows when day/section changes OR when remote data updates
  const prevKey=useRef(dkv+"|"+sectionKey);
  const prevDataSig=useRef(JSON.stringify(dayData));
  useEffect(()=>{
    const k=dkv+"|"+sectionKey;
    const sig=JSON.stringify(dayData);
    if(k!==prevKey.current){prevKey.current=k;prevDataSig.current=sig;setLocalEdits({});setRows(buildRows())}
    else if(sig!==prevDataSig.current){
      prevDataSig.current=sig;
      // Merge remote data into rows without overwriting unsaved local edits
      setRows(prev=>sites.map((s,si)=>{
        const r={id:s.id,slots:{}};
        slots.forEach(sl=>{
          r.slots[sl]={};
          fields.forEach(f=>{
            const editKey=s.id+"|"+sl+"|"+f.id;
            if(localEdits[editKey]!==undefined){r.slots[sl][f.id]=prev[si]?.slots[sl]?.[f.id]??""}
            else{r.slots[sl][f.id]=dayData[s.id]?.[sl]?.[f.id]??""}
          });
        });
        return r;
      }));
    }
  },[dkv,sectionKey,dayData]);

  const set=(si,sl,fid,val)=>{
    const n=[...rows];
    n[si]={...n[si],slots:{...n[si].slots,[sl]:{...n[si].slots[sl],[fid]:val}}};
    setRows(n);
    setLocalEdits(prev=>({...prev,[sites[si].id+"|"+sl+"|"+fid]:true}));
  };

  const allF=useMemo(()=>{
    const a=[];sites.forEach((s,si)=>{slots.forEach(sl=>{fields.forEach(f=>{a.push({si,sl,f:f.id})})})});return a;
  },[sites.length,slots.length,fields.length]);

  const handleKey=(e,si,sl,fid)=>{
    if(e.key==="Enter"||e.key==="Tab"){
      e.preventDefault();
      const idx=allF.findIndex(x=>x.si===si&&x.sl===sl&&x.f===fid);
      const next=e.shiftKey?allF[idx-1]:allF[idx+1];
      if(next)refs.current[next.si+"-"+next.sl+"-"+next.f]?.focus();
    }
  };

  const save=()=>{
    const result={};
    rows.forEach(r=>{
      const sd={};
      slots.forEach(sl=>{
        const hasD=fields.some(f=>r.slots[sl][f.id]!=="");
        if(hasD){sd[sl]={_user:user.name,_ts:Date.now()};fields.forEach(f=>{sd[sl][f.id]=r.slots[sl][f.id]})}
      });
      if(Object.keys(sd).length)result[r.id]=sd;
    });
    onSave(dkv,sectionKey,result);
    setLocalEdits({});
  };

  const hasData=rows.some(r=>slots.some(sl=>fields.some(f=>r.slots[sl][f.id]!=="")));

  const inp=(si,sl,f)=>{
    const val=rows[si].slots[sl][f.id];
    const site=sites[si];
    const saved=dayData[site.id]?.[sl];
    const who=saved?._user;const when=saved?._ts;
    const tip=who?("Logged by "+who+(when?" at "+fT(when):"")):"";
    const isA=f.alert&&val!==""&&!isNaN(parseFloat(val))&&parseFloat(val)<=site[f.alert];
    const isNow=sl===nowSlot;
    const bgColor=isA?C.r+"22":isNow&&val===""?C.y+"15":C.inputBg;
    const brdColor=isA?C.r:isNow&&val===""?C.y+"88":C.brd;
    return <input
      ref={el=>{refs.current[si+"-"+sl+"-"+f.id]=el}}
      value={val}
      onChange={e=>set(si,sl,f.id,e.target.value)}
      onKeyDown={e=>handleKey(e,si,sl,f.id)}
      type={f.type||"text"} step={f.step||"any"} placeholder={isNow?"NOW":"--"} title={tip}
      style={{width:f.w||40,padding:"4px 2px",background:bgColor,border:"1px solid "+brdColor,borderRadius:3,color:val!==""?(isA?C.r:C.white):isNow?C.y+"66":C.dim+"44",fontSize:11,fontFamily:ft,fontWeight:val!==""?600:400,outline:"none",boxSizing:"border-box",textAlign:"center"}}
      onFocus={e=>{e.target.style.borderColor=C.g;e.target.select()}}
      onBlur={e=>{e.target.style.borderColor=isA?C.r:C.brd}}
    />;
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:10,color:C.dim}}>Tab/Enter to advance | Hover cells to see who logged</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {(()=>{const users=new Set();sites.forEach(s=>{slots.forEach(sl=>{const u=dayData[s.id]?.[sl]?._user;if(u)users.add(u)})});return users.size>0?<div style={{fontSize:9,color:C.dim}}>Logged by: {[...users].map((u,i)=><span key={u} style={{color:C.g,fontWeight:600}}>{i>0?", ":""}{u}</span>)}</div>:null})()}
          <button onClick={save} style={{padding:"6px 16px",background:hasData?C.g:C.brd,color:hasData?C.bg:C.dim,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:hasData?"pointer":"not-allowed",letterSpacing:1}}>Save</button>
        </div>
      </div>
      <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",minWidth:Math.max(600,slots.length*fields.length*46+140)}}>
            <thead>
              <tr>
                <th style={{padding:"6px 8px",textAlign:"left",fontSize:8,color:C.dim,letterSpacing:2,borderBottom:"2px solid "+C.brd,position:"sticky",left:0,background:C.s,zIndex:3,minWidth:110,textTransform:"uppercase"}}>Site</th>
                {siteExtra&&<th style={{padding:"6px 4px",textAlign:"center",fontSize:7,color:C.dim,letterSpacing:1,borderBottom:"2px solid "+C.brd,textTransform:"uppercase"}}>{siteExtra.label}</th>}
                {slots.map((sl,i)=>{const isNow=sl===nowSlot;return <th key={sl} colSpan={fields.length} className={isNow?"slot-now":""} style={{padding:"6px 2px",textAlign:"center",fontSize:isNow?10:9,color:isNow?C.y:C.dim,borderBottom:isNow?"2px solid "+C.y:"2px solid "+C.brd,borderLeft:"1px solid "+C.brd,background:isNow?C.y+"18":"transparent",fontWeight:isNow?700:400}}>{slotLabels[i]}{isNow?" \u25C0":""}</th>})}
              </tr>
              <tr>
                <th style={{padding:"3px 8px",borderBottom:"1px solid "+C.brd,position:"sticky",left:0,background:C.s,zIndex:3}}/>
                {siteExtra&&<th style={{padding:"3px 4px",borderBottom:"1px solid "+C.brd}}/>}
                {slots.map(sl=>fields.map((f,fi)=><th key={sl+f.id} style={{padding:"3px 2px",fontSize:7,color:f.color||C.dim,textAlign:"center",borderBottom:"1px solid "+C.brd,borderLeft:fi===0?"1px solid "+C.brd:"none",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>{f.label}</th>))}
              </tr>
            </thead>
            <tbody>
              {sites.map((site,si)=><tr key={site.id} style={{borderBottom:"1px solid "+C.brd}}>
                <td style={{padding:"5px 8px",position:"sticky",left:0,background:C.s,zIndex:2,borderRight:"1px solid "+C.brd}}><div style={{fontSize:11,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}><span onClick={()=>window._openSitePopup&&window._openSitePopup(site.n)} style={{color:C.g,textDecoration:"underline",cursor:"pointer"}}>{site.n}</span></div></td>
                {siteExtra&&<td style={{padding:"3px 4px",textAlign:"center",fontSize:8}}>{site.max&&<><div style={{color:C.g,fontWeight:600}}>{site.max}</div><div style={{color:C.r,fontSize:7}}>{"\u2264"}{site.out}</div></>}</td>}
                {slots.map(sl=>fields.map((f,fi)=><td key={sl+f.id} style={{padding:"2px 1px",textAlign:"center",borderLeft:fi===0?"1px solid "+C.brd:"none"}}>{inp(si,sl,f)}</td>))}
              </tr>)}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function Report({data,dayKey:dkv,user,onClose}){
  const ref=useRef(null);
  const dd=data[dkv]||{};
  const dateStr=fL(new Date(dkv+"T12:00:00"));
  const shifts=dd.shifts||[];

  const thS={background:"#0a0e14",color:"#fff",padding:"4px 3px",textAlign:"center",fontSize:6,textTransform:"uppercase",letterSpacing:1,fontFamily:"monospace"};
  const tdS=si=>({padding:"3px 3px",borderBottom:"1px solid #eee",textAlign:"center",fontFamily:"monospace",fontSize:9,background:si%2?"#fafafa":"#fff"});
  const tdN=si=>({...tdS(si),textAlign:"left",fontWeight:600});
  const secH={fontFamily:"monospace",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginTop:12,marginBottom:5,borderBottom:"1px solid #ddd",paddingBottom:3};

  // Build audit trail from all sections
  const auditEntries=[];
  SECTIONS.forEach(sec=>{
    const sd=dd[sec.id]||{};
    sec.sites.forEach(site=>{
      sec.slots.forEach((sl,si)=>{
        const slotData=sd[site.id]?.[sl];
        if(slotData&&slotData._user){
          auditEntries.push({section:sec.label,site:site.n,slot:sec.slotLabels[si],user:slotData._user,ts:slotData._ts});
        }
      });
    });
  });
  auditEntries.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const renderT=(title,sk,sites,slots,labels,fields,showExtra)=>{
    const sd=dd[sk]||{};
    // Collect who logged each slot
    const slotUsers={};
    sites.forEach(site=>{slots.forEach(sl=>{const u=sd[site.id]?.[sl]?._user;if(u)slotUsers[sl]=u})});
    return(<div><div style={secH}>{title}</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:9,marginBottom:6}}>
        <thead><tr><th style={{...thS,textAlign:"left",paddingLeft:6,minWidth:70}}>Site</th>
          {showExtra&&<><th style={{...thS,minWidth:20}}>Max</th><th style={{...thS,minWidth:20}}>Out</th></>}
          {labels.map(l=><th key={l} colSpan={fields.length} style={{...thS,borderLeft:"1px solid #333"}}>{l}</th>)}</tr>
          <tr><th style={thS}/>{showExtra&&<><th style={thS}/><th style={thS}/></>}
          {slots.map(sl=>fields.map((f,fi)=><th key={sl+f.id} style={{...thS,borderLeft:fi===0?"1px solid #333":"none",fontSize:5}}>{f.label}</th>))}</tr>
        </thead>
        <tbody>{sites.map((site,si)=><tr key={site.id}>
          <td style={tdN(si)}>{site.n}</td>
          {showExtra&&<><td style={tdS(si)}>{site.max||""}</td><td style={{...tdS(si),color:site.out?"#cc0000":"inherit"}}>{site.out?"\u2264"+site.out:""}</td></>}
          {slots.map(sl=>fields.map((f,fi)=>{
            const v=sd[site.id]?.[sl]?.[f.id];
            const isA=f.alert&&v!=null&&v!==""&&parseFloat(v)<=site[f.alert];
            return <td key={sl+f.id} style={{...tdS(si),borderLeft:fi===0?"1px solid #eee":"none",color:isA?"#cc0000":"inherit",fontWeight:isA?700:400}}>{v!=null&&v!==""?v:"--"}</td>}))}
        </tr>)}
        {/* Logged-by row */}
        {Object.keys(slotUsers).length>0&&<tr>
          <td style={{...tdN(0),fontSize:7,color:"#999"}}>Logged by</td>
          {showExtra&&<><td/><td/></>}
          {slots.map(sl=><td key={sl} colSpan={fields.length} style={{padding:"2px 3px",fontSize:7,color:"#999",textAlign:"center",borderLeft:"1px solid #eee"}}>{slotUsers[sl]||""}</td>)}
        </tr>}
        </tbody>
      </table></div>);
  };

  const reportCSS='*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;padding:16px;font-size:9px}table{width:100%;border-collapse:collapse;font-size:8px;margin-bottom:6px}th{background:#0a0e14;color:#fff;padding:4px 3px;text-align:center;font-size:6px;text-transform:uppercase;font-family:monospace}td{padding:3px;border-bottom:1px solid #eee;text-align:center;font-family:monospace;font-size:8px}tr:nth-child(even) td{background:#fafafa}@media print{body{padding:8px}}';

  const getReportHTML=()=>{
    const el=ref.current;if(!el)return null;
    return '<!DOCTYPE html><html><head><title>ROCC Report - '+dkv+'</title><style>'+reportCSS+'</style></head><body>'+el.innerHTML+'</body></html>';
  };

  const print=()=>{
    const html=getReportHTML();if(!html)return;
    const w=window.open("","_blank");
    if(!w){alert("Please allow popups for this site to print reports.");return}
    w.document.write(html.replace('</body>','<script>window.onload=function(){window.print()}<\/script></body>'));
    w.document.close();
  };

  const download=()=>{
    const html=getReportHTML();if(!html)return;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="ROCC_Report_"+dkv+".html";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",flexDirection:"column",zIndex:200}}>
      <div style={{background:C.s,borderBottom:"1px solid "+C.brd,padding:"8px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{color:"#fff",fontSize:13,fontWeight:700,fontFamily:ft}}>Daily Report - {dateStr}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={download} style={{padding:"6px 16px",background:C.b,color:"#fff",border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Download File</button>
          <button onClick={print} style={{padding:"6px 16px",background:C.g,color:C.bg,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Print / PDF</button>
          <button onClick={onClose} style={{padding:"6px 12px",background:"transparent",border:"1px solid "+C.brd,borderRadius:5,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>Close</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",justifyContent:"center",padding:12}}>
        <div style={{background:"#fff",width:1100,minHeight:900,borderRadius:4,boxShadow:"0 4px 40px rgba(0,0,0,0.5)"}}>
          <div ref={ref} style={{padding:20,fontFamily:"Arial,sans-serif",color:"#1a1a2e",fontSize:9}}>
            <div style={{borderBottom:"3px solid #0a0e14",paddingBottom:8,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontFamily:"monospace",fontSize:16,fontWeight:700}}>ROCC Daily Operations Report</div><div style={{fontSize:11,color:"#555"}}>{dateStr}</div></div>
              <div style={{textAlign:"right",fontSize:8,color:"#777"}}><div style={{fontWeight:700,color:"#1a1a2e",fontSize:10}}>AES Clean Energy</div><div>Control Center Operations</div><div>Generated: {new Date().toLocaleString("en-US")}</div></div>
            </div>
            {shifts.length>0&&<div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>{shifts.map((s,i)=><div key={i} style={{background:"#f5f5f5",padding:"4px 10px",borderRadius:3,fontSize:9}}><strong>{s.name}</strong> ({s.role}) - {s.shift} - {fT(s.loginTime)}</div>)}</div>}
            {renderT("BESS Availability","bess_avail",BESS_SITES,AVAIL_SLOTS,AVAIL_LBL,[{id:"nc",label:"#N/C",alert:"out"},{id:"soc",label:"SOC%"}],true)}
            {renderT("BESS Control","bess_ctrl",BESS_SITES,CTRL_SLOTS,CTRL_LBL,[{id:"vvar",label:"V/VAR"},{id:"ads",label:"ADS"},{id:"pmax",label:"Pmax"},{id:"emax",label:"Emax"},{id:"pcomm",label:"PCom"},{id:"acomm",label:"ACom"}],false)}
            {renderT("CA PV Beacon","ca_beacon",CAPV_BEACONS,CAPV_SLOTS,CAPV_LBL,[{id:"pf",label:"PF"},{id:"curt",label:"Curt"}],false)}
            {renderT("CA PV Big Sky","ca_bigsky",CAPV_BIGSKY,CAPV_SLOTS,CAPV_LBL,[{id:"vars",label:"Y/N"}],false)}
            {renderT("V/VAR Bellefield","vvar_bell",BELL_SITES,VVAR_SLOTS,VVAR_LBL,[{id:"volt",label:"Volt"},{id:"mvar",label:"MVAR"},{id:"ads",label:"ADS"}],false)}
            {renderT("Site BESS Bellefield","sbess_bell",BELL_SITES,SBESS_SLOTS,SBESS_LBL,[{id:"nc",label:"#N/C"},{id:"soc",label:"SOC%"},{id:"inv",label:"#INV"},{id:"am",label:"A/M"}],false)}
            {renderT("V/VAR Rexford","vvar_rex",REX_SITES,VVAR_SLOTS,VVAR_LBL,[{id:"volt",label:"Volt"},{id:"mvar",label:"MVAR"},{id:"ads",label:"ADS"}],false)}
            {renderT("Site BESS Rexford","sbess_rex",REX_SITES,SBESS_SLOTS,SBESS_LBL,[{id:"nc",label:"#N/C"},{id:"soc",label:"SOC%"},{id:"inv",label:"#INV"},{id:"am",label:"A/M"}],false)}
            {renderT("AZ Sites","rando_az",RANDO_AZ,RANDO_SLOTS,RANDO_LBL,[{id:"vars",label:"Y/N"}],false)}
            {renderT("MCF PV","rando_mcf",RANDO_MCF,RANDO_SLOTS,RANDO_LBL,[{id:"mvar",label:"MVAR"},{id:"ads",label:"ADS"}],false)}
            {renderT("Road Runner / Kauai","rando_misc",[...RANDO_RR,...RANDO_KAUAI],RANDO_SLOTS,RANDO_LBL,[{id:"val",label:"Value"}],false)}
            {renderT("Substation Checks","subs",SUB_SITES,SUB_SLOTS,SUB_LBL,[{id:"sat",label:"SAT"},{id:"notes",label:"Notes"}],false)}
            {(dd.notes||[]).length>0&&<div>
              <div style={secH}>Shift Notes</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:8,marginBottom:6}}>
                <thead><tr>{["Operator","Role","Time","Note"].map(h=><th key={h} style={{...thS,textAlign:"left",paddingLeft:6}}>{h}</th>)}</tr></thead>
                <tbody>{(dd.notes||[]).map((n,i)=><tr key={i}>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6,fontWeight:700}}>{n.user}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{n.role}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{n.ts?new Date(n.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6,maxWidth:500}}>{n.text}</td>
                </tr>)}</tbody>
              </table>
            </div>}
            {auditEntries.length>0&&<div>
              <div style={secH}>Audit Trail - Data Entry Log</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:8,marginBottom:6}}>
                <thead><tr>{["Operator","Section","Site","Time Slot","Logged At"].map(h=><th key={h} style={{...thS,textAlign:"left",paddingLeft:6}}>{h}</th>)}</tr></thead>
                <tbody>{auditEntries.slice(0,50).map((e,i)=><tr key={i}>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6,fontWeight:700}}>{e.user}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{e.section}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{e.site}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{e.slot}</td>
                  <td style={{...tdS(i),textAlign:"left",paddingLeft:6}}>{e.ts?new Date(e.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</td>
                </tr>)}</tbody>
              </table>
            </div>}
            <div style={{marginTop:20,display:"flex",gap:36}}>{["Operator Signature","Shift Lead Signature","Date"].map(l=><div key={l} style={{flex:1}}><div style={{borderBottom:"1px solid #999",height:20,marginBottom:2}}/><div style={{fontSize:7,color:"#777",textTransform:"uppercase",letterSpacing:1}}>{l}</div></div>)}</div>
            <div style={{marginTop:14,paddingTop:6,borderTop:"2px solid #0a0e14",display:"flex",justifyContent:"space-between",fontSize:8,color:"#777"}}><div>AES Clean Energy - ROCC Control Center Voltage Logs V3.0 | Developed by Rocky Dev Co.</div><div>Confidential - Internal Use Only</div></div>
          </div>
        </div>
      </div>
    </div>
  );
}
