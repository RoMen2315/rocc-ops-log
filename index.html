const isOnline=SCRIPT_URL&&!SCRIPT_URL.includes("PASTE_YOUR");

async function gsGetAll(){
  if(!isOnline)return null;
  try{
    const r=await fetch(SCRIPT_URL+"?action=getAll",{redirect:"follow"});
    if(!r.ok)return null;
    const j=await r.json();
    const out={};
    Object.entries(j.data||{}).forEach(([k,v])=>{try{out[k]=JSON.parse(v)}catch{out[k]=v}});
    return out;
  }catch(e){console.error("gsGetAll",e);return null}
}

async function gsSet(key,value,userName){
  if(!isOnline)return false;
  try{
    const r=await fetch(SCRIPT_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"merge",key,value:JSON.stringify(value),user:userName||""})});
    if(!r.ok){console.error("gsSet HTTP",r.status);return false}
    try{const j=await r.json();if(!j.success){console.error("gsSet fail",j.error);return false}}catch{}
    return true;
  }catch(e){console.error("gsSet",e);return false}
}

// Deep merge for sync: merges at day > section > site > slot level
function deepMerge(local,remote){
  const m={...local};
  Object.entries(remote).forEach(([dk,rv])=>{
    if(rv&&typeof rv==="object"&&!Array.isArray(rv)){
      m[dk]={...(m[dk]||{})};
      Object.entries(rv).forEach(([sk,sv])=>{
        if(sk==="shifts"){m[dk].shifts=sv}
        else if(sv&&typeof sv==="object"&&!Array.isArray(sv)){
          m[dk][sk]={...(m[dk][sk]||{})};
          Object.entries(sv).forEach(([siteId,siteData])=>{
            if(siteData&&typeof siteData==="object"&&!Array.isArray(siteData)){
              m[dk][sk][siteId]={...(m[dk][sk][siteId]||{})};
              Object.entries(siteData).forEach(([slot,slotData])=>{
                if(slotData&&typeof slotData==="object"&&!Array.isArray(slotData)){
                  m[dk][sk][siteId][slot]={...(m[dk][sk][siteId][slot]||{}),...slotData};
                }else{m[dk][sk][siteId][slot]=slotData}
              });
            }else{m[dk][sk][siteId]=siteData}
          });
        }else{m[dk][sk]=sv}
      });
    }else{m[dk]=rv}
  });
  return m;
}

// Check if a time slot should be expected given current hour and whether viewing a past day
function slotExpected(slotStr,h,viewingPast){
  if(viewingPast)return true;
  const sh=parseInt(slotStr)/100;
  if(h<6&&sh>=18)return true; // after midnight, late-night slots from "yesterday" are expected
  if(sh<=h)return true;
  return false;
}

// Sparkline SVG chart
function Spark({vals,labels,w:width,h:height,min:forceMin,max:forceMax,thresholds,showArea,showDots}){
  const W=width||200,H=height||50,pad=4;
  const pts=vals.map((v,i)=>({v,i,label:labels?labels[i]:""})).filter(p=>p.v!=null);
  if(pts.length<2)return <svg width={W} height={H}><text x={W/2} y={H/2+3} textAnchor="middle" fill={C.dim} fontSize={9} fontFamily={ft}>No data</text></svg>;
  const mn=forceMin!=null?forceMin:Math.min(...pts.map(p=>p.v));
  const mx=forceMax!=null?forceMax:Math.max(...pts.map(p=>p.v));
  const range=mx-mn||1;
  const xStep=(W-pad*2)/(vals.length-1);
  const yOf=v=>pad+(1-(v-mn)/range)*(H-pad*2);
  const coords=pts.map(p=>({x:pad+p.i*xStep,y:yOf(p.v),v:p.v,label:p.label}));
  const line=coords.map((c,i)=>(i===0?"M":"L")+c.x.toFixed(1)+","+c.y.toFixed(1)).join(" ");
  const area=line+" L"+coords[coords.length-1].x.toFixed(1)+","+(H-pad)+" L"+coords[0].x.toFixed(1)+","+(H-pad)+" Z";
  // Threshold zones
  const zones=[];
  if(thresholds){
    thresholds.forEach(t=>{
      const y1=t.max!=null?yOf(Math.min(t.max,mx)):pad;
      const y2=t.min!=null?yOf(Math.max(t.min,mn)):H-pad;
      if(y2>y1)zones.push(<rect key={t.color} x={pad} y={y1} width={W-pad*2} height={y2-y1} fill={t.color} opacity={0.08} rx={2}/>);
    });
  }
  const lineColor=coords[coords.length-1].v>=80?C.g:coords[coords.length-1].v>=50?C.y:coords[coords.length-1].v>=20?C.o:C.r;
  return(
    <svg width={W} height={H} style={{display:"block"}}>
      {zones}
      {showArea&&<path d={area} fill={lineColor} opacity={0.1}/>}
      <path d={line} fill="none" stroke={lineColor} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
      {showDots!==false&&coords.map((c,i)=>{
        const col=c.v>=80?C.g:c.v>=50?C.y:c.v>=20?C.o:C.r;
        return <circle key={i} cx={c.x} cy={c.y} r={2.5} fill={col} stroke={C.s} strokeWidth={1}>
          <title>{c.label?c.label+": ":""}{c.v}%</title>
        </circle>;
      })}
    </svg>
  );
}

    <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:250,overflowY:"auto"}}>{notes.slice().reverse().map((n,i)=>
      <div key={i} style={{background:C.bg,border:"1px solid "+C.brd,borderRadius:5,padding:"8px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div><span style={{fontSize:11,fontWeight:700,color:C.g}}>{n.user}</span><span style={{fontSize:9,color:C.dim,marginLeft:6}}>{n.role}</span></div>
          <div style={{fontSize:9,color:C.dim}}>{n.ts?new Date(n.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</div>
        </div>
        <div style={{fontSize:12,color:C.white,lineHeight:"1.4"}}>{n.text}</div>
      </div>)}</div>}
  </div>);
}

// ================================================================
// DASHBOARD
// ================================================================
function Dashboard({data,dayKey:dkv,user,onSaveNote}){
  const dd=data[dkv]||{};
  const avail=dd.bess_avail||{};
  const subs=dd.subs||{};
  const shifts=dd.shifts||[];
  const h=curHr();
  const viewingPast=dkv<dkf(new Date());

  // Alerts
  const alerts=[];
  BESS_SITES.forEach(site=>{
    const sd=avail[site.id]||{};let lnc=null,lsl=null;
    AVAIL_SLOTS.forEach(sl=>{if(sd[sl]?.nc!=null&&sd[sl].nc!==""){lnc=parseFloat(sd[sl].nc);lsl=sl}});
    if(lnc!=null&&lnc<=site.out)alerts.push({site:site.n,nc:lnc,max:site.max,out:site.out,slot:lsl});
  });

  // SOC heatmap (BESS sites + Bellefield/Rexford from site_bess)
  const siteBess=dd.site_bess||{};
  const socData=BESS_SITES.map(site=>{
    const sd=avail[site.id]||{};
    const vals=AVAIL_SLOTS.map(sl=>{const v=sd[sl]?.soc;return v!=null&&v!==""?parseFloat(v):null});
    const lat=vals.filter(v=>v!=null);
    return{site:site.n,id:site.id,vals,latest:lat.length?lat[lat.length-1]:null,slots:AVAIL_SLOTS,slotLabels:AVAIL_LBL};
  });
  // Add Bellefield & Rexford from Site BESS section
  VVAR_SITES.forEach(site=>{
    const sd=siteBess[site.id]||{};
    const vals=SBESS_SLOTS.map(sl=>{const v=sd[sl]?.soc;return v!=null&&v!==""?parseFloat(v):null});
    const lat=vals.filter(v=>v!=null);
    socData.push({site:site.n,id:site.id,vals,latest:lat.length?lat[lat.length-1]:null,slots:SBESS_SLOTS,slotLabels:SBESS_LBL,isSiteBess:true});
  });

  // Missing
  const eAS=AVAIL_SLOTS.filter(sl=>slotExpected(sl,h,viewingPast));
  const missingAvail=[];
  BESS_SITES.forEach(site=>{const sd=avail[site.id]||{};eAS.forEach(sl=>{if(!sd[sl]||sd[sl].nc==null||sd[sl].nc==="")missingAvail.push({site:site.n,slot:AVAIL_LBL[AVAIL_SLOTS.indexOf(sl)]})})});
  const eSS=SUB_SLOTS.filter(sl=>slotExpected(sl,h,viewingPast));
  const missingSubs=[];
  SUB_SITES.forEach(site=>{const sd=subs[site.id]||{};eSS.forEach(sl=>{if(!sd[sl]||!sd[sl].sat||sd[sl].sat==="")missingSubs.push({site:site.n,slot:SUB_LBL[SUB_SLOTS.indexOf(sl)]})})});

  // Node trend (BESS sites + Bellefield/Rexford)
  const nodeTrend=BESS_SITES.map(site=>{const sd=avail[site.id]||{};return{site:site.n,max:site.max,out:site.out,vals:AVAIL_SLOTS.map(sl=>{const v=sd[sl]?.nc;return v!=null&&v!==""?parseFloat(v):null}),slots:AVAIL_SLOTS,slotLabels:AVAIL_LBL}});
  VVAR_SITES.forEach(site=>{
    const sd=siteBess[site.id]||{};
    const vals=SBESS_SLOTS.map(sl=>{const v=sd[sl]?.nc;return v!=null&&v!==""?parseFloat(v):null});
    nodeTrend.push({site:site.n,max:null,out:null,vals,slots:SBESS_SLOTS,slotLabels:SBESS_LBL,isSiteBess:true});
  });

  // Completion
  const compSecs=[
    {name:"BESS Avail",key:"bess_avail",sites:BESS_SITES,slots:AVAIL_SLOTS,fields:["nc","soc"]},
    {name:"BESS Ctrl",key:"bess_ctrl",sites:BESS_SITES,slots:CTRL_SLOTS,fields:["vvar","ads"]},
    {name:"CA Beacon",key:"ca_beacon",sites:CAPV_BEACONS,slots:CAPV_SLOTS,fields:["pf"]},
    {name:"CA Big Sky",key:"ca_bigsky",sites:CAPV_BIGSKY,slots:CAPV_SLOTS,fields:["vars"]},
    {name:"Substations",key:"subs",sites:SUB_SITES,slots:SUB_SLOTS,fields:["sat"]},
  ];
  const completion=compSecs.map(sec=>{
    const sd=dd[sec.key]||{};let total=0,filled=0;
    const eSl=sec.slots.filter(sl=>slotExpected(sl,h,viewingPast));
    sec.sites.forEach(site=>{eSl.forEach(sl=>{sec.fields.forEach(f=>{total++;if(sd[site.id]?.[sl]?.[f]!=null&&sd[site.id][sl][f]!=="")filled++})})});
    return{name:sec.name,total,filled,pct:pct(filled,total)};
  });
  const tAll=completion.reduce((a,c)=>a+c.total,0);
  const fAll=completion.reduce((a,c)=>a+c.filled,0);

  // Outage log
  const outageLog=[];
  BESS_SITES.forEach(site=>{const sd=avail[site.id]||{};AVAIL_SLOTS.forEach((sl,i)=>{const nc=sd[sl]?.nc;if(nc!=null&&nc!==""&&parseFloat(nc)<=site.out)outageLog.push({site:site.n,slot:AVAIL_LBL[i],nc:parseFloat(nc),out:site.out,max:site.max,user:sd[sl]._user||"--"})})});

  // Sub completion
  const subComp=SUB_SITES.map(site=>{const sd=subs[site.id]||{};const done=SUB_SLOTS.filter(sl=>sd[sl]?.sat&&sd[sl].sat!=="").length;return{site:site.n,done,total:SUB_SLOTS.length,pct:pct(done,SUB_SLOTS.length)}});

  // Activity log: who entered what, when
  const activity=[];
  SECTIONS.forEach(sec=>{
    const sd=dd[sec.id]||{};
    sec.sites.forEach(site=>{
      sec.slots.forEach((sl,si)=>{
        const slotData=sd[site.id]?.[sl];
        if(slotData&&slotData._user){
          activity.push({section:sec.label,site:site.n,slot:sec.slotLabels[si],user:slotData._user,ts:slotData._ts,color:sec.color});
        }
      });
    });
  });
  activity.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const socColor=v=>{if(v==null)return C.dim+"33";if(v>=80)return C.g;if(v>=50)return C.y;if(v>=20)return C.o;return C.r};

  const heatCell=(v,colorFn)=><div style={{width:28,height:22,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",background:v!=null?colorFn(v)+"22":"transparent",border:"1px solid "+(v!=null?colorFn(v)+"44":C.brd+"44"),fontSize:9,fontWeight:v!=null?600:400,color:v!=null?colorFn(v):C.dim+"44",margin:"0 auto"}}>{v!=null?v:"--"}</div>;

  const thS={padding:"4px 8px",textAlign:"left",fontSize:8,color:C.dim,letterSpacing:2,borderBottom:"1px solid "+C.brd,textTransform:"uppercase"};
  const thC={padding:"4px 3px",textAlign:"center",fontSize:8,color:C.dim,borderBottom:"1px solid "+C.brd};

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      {/* Alerts */}
      <Box><SH color={alerts.length?C.r:C.g}>{alerts.length?alerts.length+" OUTAGE ALERT"+(alerts.length>1?"S":""):"\u2713 ALL SITES NOMINAL"}</SH>
        {alerts.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{alerts.map((a,i)=>
          <div key={i} style={{background:C.r+"18",border:"1px solid "+C.r+"44",borderRadius:4,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:12,fontWeight:700,color:C.r}}>{a.site}</div><div style={{fontSize:9,color:C.dim}}>at {AVAIL_LBL[AVAIL_SLOTS.indexOf(a.slot)]}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:C.r}}>{a.nc}<span style={{fontSize:10,fontWeight:400}}>/{a.max}</span></div><div style={{fontSize:8,color:C.r}}>OUTAGE {"\u2264"}{a.out}</div></div>
          </div>)}</div>
        :<div style={{fontSize:11,color:C.g}}>All BESS sites above outage thresholds</div>}
      </Box>

      {/* Shift */}
      <Box><SH>Shift Handoff</SH>
        {shifts.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{shifts.map((s,i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:C.bg,borderRadius:4,border:"1px solid "+(s.name===user.name?C.g+"66":C.brd)}}>
            <div><div style={{fontSize:12,fontWeight:600,color:s.name===user.name?C.g:C.white}}>{s.name}</div><div style={{fontSize:9,color:C.dim}}>{s.role}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:s.shift==="Day"?C.y:C.b,fontWeight:600}}>{s.shift}</div><div style={{fontSize:9,color:C.dim}}>{fT(s.loginTime)}</div></div>
          </div>)}</div>
        :<div style={{fontSize:11,color:C.dim}}>No operators yet</div>}
        <div style={{marginTop:8,fontSize:9,color:C.dim,borderTop:"1px solid "+C.brd,paddingTop:6}}>Current: <span style={{color:h>=6&&h<18?C.y:C.b,fontWeight:600}}>{h>=6&&h<18?"Day":"Night"} Shift</span></div>
      </Box>

      {/* Completion */}
      <Box><SH>Overall Completion</SH>
        <div style={{textAlign:"center",marginBottom:10}}>
          <div style={{fontSize:32,fontWeight:700,color:pct(fAll,tAll)>=90?C.g:pct(fAll,tAll)>=60?C.y:C.r}}>{pct(fAll,tAll)}%</div>
          <div style={{fontSize:9,color:C.dim}}>{fAll}/{tAll} readings</div></div>
        <Bar pct={pct(fAll,tAll)} color={pct(fAll,tAll)>=90?C.g:pct(fAll,tAll)>=60?C.y:C.r} h={8}/>
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4}}>{completion.map(c=>
          <div key={c.name} style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:9,color:C.dim,width:75,flexShrink:0}}>{c.name}</div>
            <div style={{flex:1}}><Bar pct={c.pct} color={c.pct>=90?C.g:c.pct>=60?C.y:C.r}/></div>
            <div style={{fontSize:10,fontWeight:600,color:c.pct>=90?C.g:c.pct>=60?C.y:C.r,width:32,textAlign:"right"}}>{c.pct}%</div>
          </div>)}</div>
      </Box>

      {/* SOC Heatmap */}
      <Box span="span 2"><SH color={C.y}>SOC Heatmap - All BESS (24hr)</SH>
        <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",minWidth:600}}>
          <thead><tr><th style={thS}>Site</th>{AVAIL_LBL.map(l=><th key={l} style={thC}>{l}</th>)}<th style={thC}>Latest</th></tr></thead>
          <tbody>{socData.filter(s=>!s.isSiteBess).map(s=><tr key={s.id}>
            <td style={{padding:"4px 8px",fontSize:10,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}>{s.site}</td>
            {s.vals.map((v,i)=><td key={i} style={{padding:"3px 2px",textAlign:"center"}}>{heatCell(v,socColor)}</td>)}
            <td style={{padding:"3px 6px",textAlign:"center",fontSize:13,fontWeight:700,color:socColor(s.latest)}}>{s.latest!=null?s.latest+"%":"--"}</td>
          </tr>)}</tbody>
        </table>
        {/* Bellefield & Rexford (different time slots) */}
        <div style={{borderTop:"1px solid "+C.brd,marginTop:6,paddingTop:6}}>
          <div style={{fontSize:8,color:C.p,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Site BESS (Bellefield / Rexford)</div>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr><th style={thS}>Site</th>{SBESS_LBL.map(l=><th key={l} style={thC}>{l}</th>)}<th style={thC}>Latest</th></tr></thead>
            <tbody>{socData.filter(s=>s.isSiteBess).map(s=><tr key={s.id}>
              <td style={{padding:"4px 8px",fontSize:10,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}>{s.site}</td>
              {s.vals.map((v,i)=><td key={i} style={{padding:"3px 2px",textAlign:"center"}}>{heatCell(v,socColor)}</td>)}
              <td style={{padding:"3px 6px",textAlign:"center",fontSize:13,fontWeight:700,color:socColor(s.latest)}}>{s.latest!=null?s.latest+"%":"--"}</td>
            </tr>)}</tbody>
          </table>
        </div></div>
      </Box>

      {/* SOC Trend Charts */}
      <Box span="span 3"><SH color={C.y}>SOC Trend Charts</SH>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
          {socData.map(s=>{
            const slots=s.isSiteBess?SBESS_SLOTS:AVAIL_SLOTS;
            const lbls=s.isSiteBess?SBESS_LBL:AVAIL_LBL;
            const lastVal=s.latest;
            const lastColor=lastVal==null?C.dim:lastVal>=80?C.g:lastVal>=50?C.y:lastVal>=20?C.o:C.r;
            const filled=s.vals.filter(v=>v!=null).length;
            return <div key={s.id} style={{background:C.bg,border:"1px solid "+C.brd,borderRadius:5,padding:"8px 10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:10,fontWeight:600,color:C.white}}>{s.site}{s.isSiteBess?<span style={{fontSize:7,color:C.p,marginLeft:4}}>SITE</span>:null}</div>
                <div style={{fontSize:14,fontWeight:700,color:lastColor}}>{lastVal!=null?lastVal+"%":"--"}</div>
              </div>
              <Spark vals={s.vals} labels={lbls} w={200} h={44} min={0} max={100} showArea={true}
                thresholds={[{min:80,max:100,color:C.g},{min:50,max:80,color:C.y},{min:20,max:50,color:C.o},{min:0,max:20,color:C.r}]}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                <span style={{fontSize:7,color:C.dim}}>{lbls[0]}</span>
                <span style={{fontSize:7,color:C.dim}}>{filled}/{slots.length} readings</span>
                <span style={{fontSize:7,color:C.dim}}>{lbls[lbls.length-1]}</span>
              </div>
            </div>;
          })}
        </div>
      </Box>

      {/* Missing */}
      <Box><SH color={missingAvail.length+missingSubs.length>0?C.y:C.g}><span className={missingAvail.length+missingSubs.length>0?"flash":""}>{missingAvail.length+missingSubs.length>0?(missingAvail.length+missingSubs.length)+" Missing":"\u2713 All Current"}</span></SH>
        <div style={{maxHeight:200,overflowY:"auto"}}>
          {missingAvail.length===0&&missingSubs.length===0&&<div style={{fontSize:11,color:C.g}}>All expected readings logged</div>}
          {missingAvail.length>0&&<><div style={{fontSize:8,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>BESS Avail</div>
            {missingAvail.slice(0,12).map((m,i)=><div key={i} style={{fontSize:10,color:C.txt,padding:"2px 0",display:"flex",justifyContent:"space-between"}}><span>{m.site}</span><span style={{color:C.r}}>{m.slot}</span></div>)}
            {missingAvail.length>12&&<div style={{fontSize:9,color:C.dim}}>+{missingAvail.length-12} more</div>}</>}
          {missingSubs.length>0&&<><div style={{fontSize:8,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginTop:8,marginBottom:4}}>Substations</div>
            {missingSubs.slice(0,8).map((m,i)=><div key={i} style={{fontSize:10,color:C.txt,padding:"2px 0",display:"flex",justifyContent:"space-between"}}><span>{m.site}</span><span style={{color:C.o}}>{m.slot}</span></div>)}</>}
        </div>
      </Box>

      {/* Node Trend */}
      <Box span="span 2"><SH color={C.g}>Node Count Trend (24hr)</SH>
        <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",minWidth:600}}>
          <thead><tr><th style={thS}>Site</th><th style={thC}>Max</th>{AVAIL_LBL.map(l=><th key={l} style={thC}>{l}</th>)}</tr></thead>
          <tbody>{nodeTrend.filter(s=>!s.isSiteBess).map(s=><tr key={s.site}>
            <td style={{padding:"4px 8px",fontSize:10,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}>{s.site}</td>
            <td style={{padding:"3px 4px",textAlign:"center",fontSize:9,color:C.g}}>{s.max}</td>
            {s.vals.map((v,i)=>{const isA=v!=null&&v<=s.out;const ratio=v!=null?v/s.max:null;const col=v==null?C.dim+"33":isA?C.r:ratio>0.9?C.g:ratio>0.7?C.y:C.o;
              return <td key={i} style={{padding:"3px 2px",textAlign:"center"}}>{heatCell(v,()=>col)}</td>})}
          </tr>)}</tbody>
        </table>
        {/* Bellefield & Rexford node counts */}
        <div style={{borderTop:"1px solid "+C.brd,marginTop:6,paddingTop:6}}>
          <div style={{fontSize:8,color:C.p,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Site BESS (Bellefield / Rexford)</div>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr><th style={thS}>Site</th>{SBESS_LBL.map(l=><th key={l} style={thC}>{l}</th>)}</tr></thead>
            <tbody>{nodeTrend.filter(s=>s.isSiteBess).map(s=><tr key={s.site}>
              <td style={{padding:"4px 8px",fontSize:10,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}>{s.site}</td>
              {s.vals.map((v,i)=>{const col=v==null?C.dim+"33":C.g;
                return <td key={i} style={{padding:"3px 2px",textAlign:"center"}}>{heatCell(v,()=>col)}</td>})}
            </tr>)}</tbody>
          </table>
        </div></div>
      </Box>

      {/* Sub Checks */}
      <Box><SH>Substation Checks</SH>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>{subComp.map(s=>
          <div key={s.site}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:10,color:C.white}}>{s.site}</span><span style={{fontSize:10,fontWeight:600,color:s.pct>=100?C.g:s.pct>0?C.y:C.dim}}>{s.done}/{s.total}</span></div>
            <Bar pct={s.pct} color={s.pct>=100?C.g:s.pct>0?C.y:C.dim}/></div>)}</div>
      </Box>

      {/* BESS Control Summary */}
      {(()=>{const sd=dd.bess_ctrl||{};const rows=BESS_SITES.map(site=>{let lat={};CTRL_SLOTS.forEach(sl=>{if(sd[site.id]?.[sl])lat=sd[site.id][sl]});return{site:site.n,vvar:lat.vvar||"--",ads:lat.ads||"--",pmax:lat.pmax||"--",emax:lat.emax||"--"}});
        return <Box span="span 3"><SH color={C.b}>BESS Control Status (Latest)</SH>
          <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr>{["Site","V/VAR","ADS","P,max","E,max"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>{rows.map(r=><tr key={r.site} style={{borderBottom:"1px solid "+C.brd}}>
              <td style={{padding:"4px 8px",fontSize:10,fontWeight:600,color:C.white}}>{r.site}</td>
              <td style={{padding:"4px 8px",fontSize:10,color:r.vvar==="--"?C.dim:C.g,fontWeight:600}}>{r.vvar}</td>
              <td style={{padding:"4px 8px",fontSize:10,color:r.ads==="--"?C.dim:C.b,fontWeight:600}}>{r.ads}</td>
              <td style={{padding:"4px 8px",fontSize:10,color:r.pmax==="--"?C.dim:C.p,fontWeight:600}}>{r.pmax}</td>
              <td style={{padding:"4px 8px",fontSize:10,color:r.emax==="--"?C.dim:C.y,fontWeight:600}}>{r.emax}</td>
            </tr>)}</tbody>
          </table></div></Box>})()}

      {/* CA PV Summary */}
      {(()=>{const bsd=dd.ca_beacon||{};const gsd=dd.ca_bigsky||{};
        const bRows=CAPV_BEACONS.map(site=>{let lat={};CAPV_SLOTS.forEach(sl=>{if(bsd[site.id]?.[sl])lat=bsd[site.id][sl]});return{site:site.n,pf:lat.pf||"--",curt:lat.curt||"--"}});
        const gRows=CAPV_BIGSKY.map(site=>{let lat={};CAPV_SLOTS.forEach(sl=>{if(gsd[site.id]?.[sl])lat=gsd[site.id][sl]});return{site:site.n,vars:lat.vars||"--"}});
        return <Box span="span 2"><SH color={C.o}>CA PV Status (Latest)</SH>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 200px"}}><div style={{fontSize:9,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Beacon - PF / Curt</div>
              {bRows.map(r=><div key={r.site} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                <span style={{fontSize:10,color:C.white}}>{r.site}</span>
                <span><span style={{fontSize:10,color:r.pf==="--"?C.dim:C.g,fontWeight:600,marginRight:10}}>{r.pf}</span><span style={{fontSize:10,color:r.curt==="--"?C.dim:C.r,fontWeight:600}}>{r.curt}</span></span>
              </div>)}</div>
            <div style={{flex:"2 1 300px"}}><div style={{fontSize:9,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Big Sky - VARs</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"2px 12px"}}>
              {gRows.map(r=><div key={r.site} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                <span style={{fontSize:9,color:C.white,whiteSpace:"nowrap"}}>{r.site}</span>
                <span style={{fontSize:10,color:r.vars==="--"?C.dim:C.g,fontWeight:600}}>{r.vars}</span>
              </div>)}</div></div>
          </div></Box>})()}

      {/* V/VAR + Site BESS Summary */}
      {(()=>{const vsd=dd.vvar_checks||{};const bsd=dd.site_bess||{};
        return <Box><SH color={C.p}>V/VAR + Site BESS (Latest)</SH>

                <div><span style={{color:C.dim}}>MVAR:</span> <span style={{color:C.y,fontWeight:600}}>{vlat.mvar||"--"}</span></div>
                <div><span style={{color:C.dim}}>ADS:</span> <span style={{color:C.b,fontWeight:600}}>{vlat.ads||"--"}</span></div>
                <div><span style={{color:C.dim}}>#N/C:</span> <span style={{color:C.g,fontWeight:600}}>{blat.nc||"--"}</span></div>
                <div><span style={{color:C.dim}}>SOC:</span> <span style={{color:C.y,fontWeight:600}}>{blat.soc?blat.soc+"%":"--"}</span></div>
                <div><span style={{color:C.dim}}>#INV:</span> <span style={{color:C.p,fontWeight:600}}>{blat.inv||"--"}</span></div>
              </div>
            </div>})}

        return <Box span="span 2"><SH color={C.r}>AZ / MCF PV / Road Runner / Kauai (Latest)</SH>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 140px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>AZ Sites - VARs</div>
              {RANDO_AZ.map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(azd[site.id]?.[sl])lat=azd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:10,color:C.white}}>{site.n}</span>
                  <span style={{fontSize:10,color:lat.vars?C.g:C.dim,fontWeight:600}}>{lat.vars||"--"}</span>
                </div>})}</div>
            <div style={{flex:"1 1 160px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>MCF PV - MVAR / ADS</div>
              {RANDO_MCF.map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(msd[site.id]?.[sl])lat=msd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:10,color:C.white}}>{site.n}</span>
                  <span><span style={{fontSize:10,color:lat.mvar?C.y:C.dim,fontWeight:600,marginRight:8}}>{lat.mvar||"--"}</span><span style={{fontSize:10,color:lat.ads?C.b:C.dim,fontWeight:600}}>{lat.ads||"--"}</span></span>
                </div>})}</div>
            <div style={{flex:"2 1 260px"}}><div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Road Runner / Kauai</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 16px"}}>
              {[...RANDO_RR,...RANDO_KAUAI].map(site=>{let lat={};RANDO_SLOTS.forEach(sl=>{if(rsd[site.id]?.[sl])lat=rsd[site.id][sl]});
                return <div key={site.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid "+C.brd}}>
                  <span style={{fontSize:9,color:C.white,whiteSpace:"nowrap"}}>{site.n}</span>
                  <span style={{fontSize:10,color:lat.val?C.g:C.dim,fontWeight:600}}>{lat.val||"--"}</span>
                </div>})}</div></div>
          </div></Box>})()}

      {/* Outage Log */}
      <Box span="span 3"><SH color={outageLog.length?C.r:C.g}>Outage Event Log {outageLog.length>0&&"("+outageLog.length+" events)"}</SH>
        {outageLog.length===0?<div style={{fontSize:11,color:C.g}}>No outage events today</div>:
        <div style={{overflowX:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
          <thead><tr>{["Site","Time","# N/C","Threshold","Max","Logged By"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd}}>{h}</th>)}</tr></thead>
          <tbody>{outageLog.map((e,i)=><tr key={i} style={{borderBottom:"1px solid "+C.brd}}>
            <td style={{padding:"6px 10px",fontWeight:700,color:C.r}}>{e.site}</td>

      <Box span="span 3">

        <ShiftNotes notes={dd.notes||[]} user={user} onSaveNote={onSaveNote}/>

      {/* Activity Log */}
      <Box span="span 3"><SH color={C.b}>Activity Log - Who Entered What ({activity.length} entries)</SH>
        {activity.length===0?<div style={{fontSize:11,color:C.dim}}>No data entries yet today</div>:
        <div style={{overflowX:"auto",maxHeight:300,overflowY:"auto"}}><table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
          <thead style={{position:"sticky",top:0,zIndex:1}}><tr>{["Operator","Section","Site","Time Slot","Logged At"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd,background:C.s}}>{h}</th>)}</tr></thead>

            <td style={{padding:"5px 10px",color:C.txt}}>{e.slot}</td>
            <td style={{padding:"5px 10px",color:C.dim}}>{e.ts?new Date(e.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</td>
          </tr>)}</tbody>
        </table></div>}
      </Box>
    </div>
  );
}

// ================================================================
// FAST GRID (input does NOT reset on background sync)
// ================================================================
function FastGrid({sectionKey,sites,slots,slotLabels,fields,data,dayKey:dkv,onSave,user,siteExtra}){
  const refs=useRef({});
  const dayData=data[dkv]?.[sectionKey]||{};
  const isToday=dkv===dkf(new Date());
  // Find the current active slot: the slot whose hour we're currently in or just passed
  const nowSlot=(()=>{
    if(!isToday)return null;
    const h=curHr();
    let best=null;
    for(let i=slots.length-1;i>=0;i--){
      const sh=parseInt(slots[i])/100;
      if(sh<=h){best=slots[i];break}
    }
    // Handle overnight: if early morning (h<6) and slots have late-night ones
    if(!best&&h<6){for(let i=slots.length-1;i>=0;i--){const sh=parseInt(slots[i])/100;if(sh>=18){best=slots[i];break}}}
    return best;
  })();

  const buildRows=()=>sites.map(s=>{
    const r={id:s.id,slots:{}};
    slots.forEach(sl=>{r.slots[sl]={};fields.forEach(f=>{r.slots[sl][f.id]=dayData[s.id]?.[sl]?.[f.id]??""})});
    return r;
  });

  const [rows,setRows]=useState(buildRows);

  // ONLY rebuild rows when day or section changes, NOT on data refresh
  const prevKey=useRef(dkv+"|"+sectionKey);
  useEffect(()=>{
    const k=dkv+"|"+sectionKey;
    if(k!==prevKey.current){prevKey.current=k;setRows(buildRows())}
  },[dkv,sectionKey]);

  const set=(si,sl,fid,val)=>{
    const n=[...rows];
    n[si]={...n[si],slots:{...n[si].slots,[sl]:{...n[si].slots[sl],[fid]:val}}};
    setRows(n);
  };

  const allF=useMemo(()=>{
    const a=[];sites.forEach((s,si)=>{slots.forEach(sl=>{fields.forEach(f=>{a.push({si,sl,f:f.id})})})});return a;
  },[sites.length,slots.length,fields.length]);

  const handleKey=(e,si,sl,fid)=>{
    if(e.key==="Enter"||e.key==="Tab"){
      e.preventDefault();
      const idx=allF.findIndex(x=>x.si===si&&x.sl===sl&&x.f===fid);
      const next=e.shiftKey?allF[idx-1]:allF[idx+1];
      if(next)refs.current[next.si+"-"+next.sl+"-"+next.f]?.focus();
    }
  };

  const save=()=>{
    const result={};
    rows.forEach(r=>{
      const sd={};
      slots.forEach(sl=>{
        const hasD=fields.some(f=>r.slots[sl][f.id]!=="");
        if(hasD){sd[sl]={_user:user.name,_ts:Date.now()};fields.forEach(f=>{sd[sl][f.id]=r.slots[sl][f.id]})}
      });
      if(Object.keys(sd).length)result[r.id]=sd;
    });
    onSave(dkv,sectionKey,result);
  };

  const hasData=rows.some(r=>slots.some(sl=>fields.some(f=>r.slots[sl][f.id]!=="")));

  const inp=(si,sl,f)=>{
    const val=rows[si].slots[sl][f.id];
    const site=sites[si];
    const saved=dayData[site.id]?.[sl];
    const who=saved?._user;const when=saved?._ts;
    const tip=who?("Logged by "+who+(when?" at "+fT(when):"")):"";
    const isA=f.alert&&val!==""&&!isNaN(parseFloat(val))&&parseFloat(val)<=site[f.alert];
    const isNow=sl===nowSlot;
    const bgColor=isA?C.r+"22":isNow&&val===""?C.y+"15":C.inputBg;
    const brdColor=isA?C.r:isNow&&val===""?C.y+"88":C.brd;
    return <input
      ref={el=>{refs.current[si+"-"+sl+"-"+f.id]=el}}
      value={val}
      onChange={e=>set(si,sl,f.id,e.target.value)}
      onKeyDown={e=>handleKey(e,si,sl,f.id)}
      type={f.type||"text"} step={f.step||"any"} placeholder={isNow?"NOW":"--"} title={tip}
      style={{width:f.w||40,padding:"4px 2px",background:bgColor,border:"1px solid "+brdColor,borderRadius:3,color:val!==""?(isA?C.r:C.white):isNow?C.y+"66":C.dim+"44",fontSize:11,fontFamily:ft,fontWeight:val!==""?600:400,outline:"none",boxSizing:"border-box",textAlign:"center"}}
      onFocus={e=>{e.target.style.borderColor=C.g;e.target.select()}}
      onBlur={e=>{e.target.style.borderColor=isA?C.r:C.brd}}
    />;
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:10,color:C.dim}}>Tab/Enter to advance | Hover cells to see who logged</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {(()=>{const users=new Set();sites.forEach(s=>{slots.forEach(sl=>{const u=dayData[s.id]?.[sl]?._user;if(u)users.add(u)})});return users.size>0?<div style={{fontSize:9,color:C.dim}}>Logged by: {[...users].map((u,i)=><span key={u} style={{color:C.g,fontWeight:600}}>{i>0?", ":""}{u}</span>)}</div>:null})()}
          <button onClick={save} style={{padding:"6px 16px",background:hasData?C.g:C.brd,color:hasData?C.bg:C.dim,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:hasData?"pointer":"not-allowed",letterSpacing:1}}>Save</button>
        </div>
      </div>
      <div style={{background:C.s,border:"1px solid "+C.brd,borderRadius:6,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",minWidth:Math.max(600,slots.length*fields.length*46+140)}}>
            <thead>
              <tr>
                <th style={{padding:"6px 8px",textAlign:"left",fontSize:8,color:C.dim,letterSpacing:2,borderBottom:"2px solid "+C.brd,position:"sticky",left:0,background:C.s,zIndex:3,minWidth:110,textTransform:"uppercase"}}>Site</th>
                {siteExtra&&<th style={{padding:"6px 4px",textAlign:"center",fontSize:7,color:C.dim,letterSpacing:1,borderBottom:"2px solid "+C.brd,textTransform:"uppercase"}}>{siteExtra.label}</th>}
                {slots.map((sl,i)=>{const isNow=sl===nowSlot;return <th key={sl} colSpan={fields.length} className={isNow?"slot-now":""} style={{padding:"6px 2px",textAlign:"center",fontSize:isNow?10:9,color:isNow?C.y:C.dim,borderBottom:isNow?"2px solid "+C.y:"2px solid "+C.brd,borderLeft:"1px solid "+C.brd,background:isNow?C.y+"18":"transparent",fontWeight:isNow?700:400}}>{slotLabels[i]}{isNow?" \u25C0":""}</th>})}
              </tr>
              <tr>
                <th style={{padding:"3px 8px",borderBottom:"1px solid "+C.brd,position:"sticky",left:0,background:C.s,zIndex:3}}/>
                {siteExtra&&<th style={{padding:"3px 4px",borderBottom:"1px solid "+C.brd}}/>}
                {slots.map(sl=>fields.map((f,fi)=><th key={sl+f.id} style={{padding:"3px 2px",fontSize:7,color:f.color||C.dim,textAlign:"center",borderBottom:"1px solid "+C.brd,borderLeft:fi===0?"1px solid "+C.brd:"none",textTransform:"uppercase",letterSpacing:1,whiteSpace:"nowrap"}}>{f.label}</th>))}
              </tr>
            </thead>
            <tbody>
              {sites.map((site,si)=><tr key={site.id} style={{borderBottom:"1px solid "+C.brd}}>
                <td style={{padding:"5px 8px",position:"sticky",left:0,background:C.s,zIndex:2,borderRight:"1px solid "+C.brd}}><div style={{fontSize:11,fontWeight:600,color:C.white,whiteSpace:"nowrap"}}>{site.n}</div></td>
                {siteExtra&&<td style={{padding:"3px 4px",textAlign:"center",fontSize:8}}>{site.max&&<><div style={{color:C.g,fontWeight:600}}>{site.max}</div><div style={{color:C.r,fontSize:7}}>{"\u2264"}{site.out}</div></>}</td>}
                {slots.map(sl=>fields.map((f,fi)=><td key={sl+f.id} style={{padding:"2px 1px",textAlign:"center",borderLeft:fi===0?"1px solid "+C.brd:"none"}}>{inp(si,sl,f)}</td>))}
              </tr>)}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// REPORT
// ================================================================
function Report({data,dayKey:dkv,user,onClose}){
  const ref=useRef(null);
  const dd=data[dkv]||{};
  const dateStr=fL(new Date(dkv+"T12:00:00"));
  const shifts=dd.shifts||[];

  const thS={background:"#0a0e14",color:"#fff",padding:"4px 3px",textAlign:"center",fontSize:6,textTransform:"uppercase",letterSpacing:1,fontFamily:"monospace"};
  const tdS=si=>({padding:"3px 3px",borderBottom:"1px solid #eee",textAlign:"center",fontFamily:"monospace",fontSize:9,background:si%2?"#fafafa":"#fff"});
  const tdN=si=>({...tdS(si),textAlign:"left",fontWeight:600});
  const secH={fontFamily:"monospace",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginTop:12,marginBottom:5,borderBottom:"1px solid #ddd",paddingBottom:3};

  // Build audit trail from all sections
  const auditEntries=[];
  SECTIONS.forEach(sec=>{
    const sd=dd[sec.id]||{};
    sec.sites.forEach(site=>{
      sec.slots.forEach((sl,si)=>{
        const slotData=sd[site.id]?.[sl];
        if(slotData&&slotData._user){
          auditEntries.push({section:sec.label,site:site.n,slot:sec.slotLabels[si],user:slotData._user,ts:slotData._ts});
        }
      });
    });
  });
  auditEntries.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const renderT=(title,sk,sites,slots,labels,fields,showExtra)=>{
    const sd=dd[sk]||{};
    // Collect who logged each slot
    const slotUsers={};
    sites.forEach(site=>{slots.forEach(sl=>{const u=sd[site.id]?.[sl]?._user;if(u)slotUsers[sl]=u})});
    return(<div><div style={secH}>{title}</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:9,marginBottom:6}}>
        <thead><tr><th style={{...thS,textAlign:"left",paddingLeft:6,minWidth:70}}>Site</th>
          {showExtra&&<><th style={{...thS,minWidth:20}}>Max</th><th style={{...thS,minWidth:20}}>Out</th></>}
          {labels.map(l=><th key={l} colSpan={fields.length} style={{...thS,borderLeft:"1px solid #333"}}>{l}</th>)}</tr>
          <tr><th style={thS}/>{showExtra&&<><th style={thS}/><th style={thS}/></>}
          {slots.map(sl=>fields.map((f,fi)=><th key={sl+f.id} style={{...thS,borderLeft:fi===0?"1px solid #333":"none",fontSize:5}}>{f.label}</th>))}</tr>
        </thead>
        <tbody>{sites.map((site,si)=><tr key={site.id}>
          <td style={tdN(si)}>{site.n}</td>
          {showExtra&&<><td style={tdS(si)}>{site.max||""}</td><td style={{...tdS(si),color:site.out?"#cc0000":"inherit"}}>{site.out?"\u2264"+site.out:""}</td></>}
          {slots.map(sl=>fields.map((f,fi)=>{
            const v=sd[site.id]?.[sl]?.[f.id];
            const isA=f.alert&&v!=null&&v!==""&&parseFloat(v)<=site[f.alert];
            return <td key={sl+f.id} style={{...tdS(si),borderLeft:fi===0?"1px solid #eee":"none",color:isA?"#cc0000":"inherit",fontWeight:isA?700:400}}>{v!=null&&v!==""?v:"--"}</td>}))}
        </tr>)}
        {/* Logged-by row */}
        {Object.keys(slotUsers).length>0&&<tr>
          <td style={{...tdN(0),fontSize:7,color:"#999"}}>Logged by</td>
          {showExtra&&<><td/><td/></>}
          {slots.map(sl=><td key={sl} colSpan={fields.length} style={{padding:"2px 3px",fontSize:7,color:"#999",textAlign:"center",borderLeft:"1px solid #eee"}}>{slotUsers[sl]||""}</td>)}
        </tr>}
        </tbody>
      </table></div>);
  };

  const reportCSS='*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;padding:16px;font-size:9px}table{width:100%;border-collapse:collapse;font-size:8px;margin-bottom:6px}th{background:#0a0e14;color:#fff;padding:4px 3px;text-align:center;font-size:6px;text-transform:uppercase;font-family:monospace}td{padding:3px;border-bottom:1px solid #eee;text-align:center;font-family:monospace;font-size:8px}tr:nth-child(even) td{background:#fafafa}@media print{body{padding:8px}}';

  const getReportHTML=()=>{
    const el=ref.current;if(!el)return null;
    return '<!DOCTYPE html><html><head><title>ROCC Report - '+dkv+'</title><style>'+reportCSS+'</style></head><body>'+el.innerHTML+'</body></html>';
  };

  const print=()=>{
    const html=getReportHTML();if(!html)return;
    const w=window.open("","_blank");
    if(!w){alert("Please allow popups for this site to print reports.");return}
    w.document.write(html.replace('</body>','<script>window.onload=function(){window.print()}<\/script></body>'));
    w.document.close();
  };

  const download=()=>{
    const html=getReportHTML();if(!html)return;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="ROCC_Report_"+dkv+".html";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",flexDirection:"column",zIndex:200}}>
      <div style={{background:C.s,borderBottom:"1px solid "+C.brd,padding:"8px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{color:"#fff",fontSize:13,fontWeight:700,fontFamily:ft}}>Daily Report - {dateStr}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={download} style={{padding:"6px 16px",background:C.b,color:"#fff",border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Download File</button>
          <button onClick={print} style={{padding:"6px 16px",background:C.g,color:C.bg,border:"none",borderRadius:5,fontSize:11,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Print / PDF</button>
          <button onClick={onClose} style={{padding:"6px 12px",background:"transparent",border:"1px solid "+C.brd,borderRadius:5,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>Close</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",justifyContent:"center",padding:12}}>
        <div style={{background:"#fff",width:1100,minHeight:900,borderRadius:4,boxShadow:"0 4px 40px rgba(0,0,0,0.5)"}}>
          <div ref={ref} style={{padding:20,fontFamily:"Arial,sans-serif",color:"#1a1a2e",fontSize:9}}>
            <div style={{borderBottom:"3px solid #0a0e14",paddingBottom:8,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontFamily:"monospace",fontSize:16,fontWeight:700}}>ROCC Daily Operations Report</div><div style={{fontSize:11,color:"#555"}}>{dateStr}</div></div>

// SHIFT TURNOVER
// ================================================================
function Turnover({data,dayKey:dkv,user,onSave}){
  const dd=data[dkv]||{};
  const turnovers=dd.turnovers||[];
  const h=curHr();
  const currentShiftType=h>=6&&h<18?"Day":"Night";

  // Auto snapshot from today's data
  const avail=dd.bess_avail||{};
  const alerts=[];
  BESS_SITES.forEach(site=>{
    const sd=avail[site.id]||{};let lnc=null,lsl=null;
    AVAIL_SLOTS.forEach(sl=>{if(sd[sl]?.nc!=null&&sd[sl].nc!==""){lnc=parseFloat(sd[sl].nc);lsl=sl}});
    if(lnc!=null&&lnc<=site.out)alerts.push({site:site.n,nc:lnc,max:site.max,slot:lsl});
  });
  const lowSoc=[];
  BESS_SITES.forEach(site=>{
    const sd=avail[site.id]||{};let last=null;
    AVAIL_SLOTS.forEach(sl=>{const v=sd[sl]?.soc;if(v!=null&&v!=="")last=parseFloat(v)});
    if(last!=null&&last<20)lowSoc.push({site:site.n,soc:last});
  });
  const viewingPast=dkv<dkf(new Date());
  const eAS=AVAIL_SLOTS.filter(sl=>slotExpected(sl,h,viewingPast));
  let missingCount=0;
  BESS_SITES.forEach(site=>{const sd=avail[site.id]||{};eAS.forEach(sl=>{if(!sd[sl]||sd[sl].nc==null||sd[sl].nc==="")missingCount++})});
  const compSecs=[
    {key:"bess_avail",sites:BESS_SITES,slots:AVAIL_SLOTS,fields:["nc","soc"]},
    {key:"bess_ctrl",sites:BESS_SITES,slots:CTRL_SLOTS,fields:["vvar","ads"]},
    {key:"subs",sites:SUB_SITES,slots:SUB_SLOTS,fields:["sat"]},
  ];
  let tAll=0,fAll=0;
  compSecs.forEach(sec=>{const sd=dd[sec.key]||{};const eSl=sec.slots.filter(sl=>slotExpected(sl,h,viewingPast));sec.sites.forEach(site=>{eSl.forEach(sl=>{sec.fields.forEach(f=>{tAll++;if(sd[site.id]?.[sl]?.[f]!=null&&sd[site.id][sl][f]!=="")fAll++})})})});

  // Draft state
  const [issues,setIssues]=useState([{site:"",issue:"",status:"Active"}]);
  const [events,setEvents]=useState("");
  const [pending,setPending]=useState("");
  const [submitting,setSubmitting]=useState(false);

  // Acknowledge state
  const [ackIdx,setAckIdx]=useState(null);

  const addIssueRow=()=>setIssues(p=>[...p,{site:"",issue:"",status:"Active"}]);
  const setIssue=(i,field,val)=>{const n=[...issues];n[i]={...n[i],[field]:val};setIssues(n)};
  const removeIssue=(i)=>setIssues(p=>p.filter((_,j)=>j!==i));

  const submit=()=>{
    const filledIssues=issues.filter(r=>r.site.trim()||r.issue.trim());
    const turnover={
      id:Date.now(),
      outgoing:{name:user.name,role:user.role,shift:user.shift},
      shiftType:currentShiftType,
      ts:Date.now(),
      issues:filledIssues,
      events:events.trim(),
      pending:pending.trim(),
      snapshot:{alerts:alerts.length,lowSoc:lowSoc.length,missing:missingCount,completion:tAll>0?pct(fAll,tAll):0,alertDetails:alerts.slice(0,5),lowSocDetails:lowSoc.slice(0,5)},
      ack:null
    };
    onSave(dkv,turnover);
    setIssues([{site:"",issue:"",status:"Active"}]);
    setEvents("");
    setPending("");
  };

  const acknowledge=(idx)=>{
    const t=turnovers[idx];
    if(!t)return;
    const updated={...t,ack:{name:user.name,role:user.role,ts:Date.now()}};
    const newTurnovers=[...turnovers];
    newTurnovers[idx]=updated;
    onSave(dkv,null,newTurnovers);
    setAckIdx(null);
  };

  const is={width:"100%",padding:"8px 10px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:4,color:C.white,fontSize:11,fontFamily:ft,outline:"none",boxSizing:"border-box"};
  const selS={...is,cursor:"pointer",width:"auto",minWidth:90};

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      {/* New Turnover Form */}
      <Box span="span 2"><SH color={C.y}>New Shift Turnover</SH>
        <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{fontSize:11,color:C.white}}><span style={{color:C.g,fontWeight:700}}>{user.name}</span> <span style={{color:C.dim}}>({user.role})</span></div>
          <div style={{fontSize:11,color:h>=6&&h<18?C.y:C.b,fontWeight:600}}>{currentShiftType} Shift</div>
          <div style={{fontSize:10,color:C.dim}}>{new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
        </div>

        {/* Issues & Exceptions */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Issues & Exceptions (sites needing attention)</div>
          {issues.map((row,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
            <input value={row.site} onChange={e=>setIssue(i,"site",e.target.value)} placeholder="Site name" style={{...is,width:140,flexShrink:0}}/>
            <input value={row.issue} onChange={e=>setIssue(i,"issue",e.target.value)} placeholder="Issue description" style={{...is,flex:1}}/>
            <select value={row.status} onChange={e=>setIssue(i,"status",e.target.value)} style={selS}>
              <option>Active</option><option>Monitoring</option><option>Resolved</option><option>Escalated</option>
            </select>
            {issues.length>1&&<button onClick={()=>removeIssue(i)} style={{padding:"4px 8px",background:"transparent",border:"1px solid "+C.brd,borderRadius:3,color:C.r,fontSize:11,fontFamily:ft,cursor:"pointer"}}>x</button>}
          </div>)}
          <button onClick={addIssueRow} style={{padding:"4px 12px",background:"transparent",border:"1px dashed "+C.brd,borderRadius:4,color:C.dim,fontSize:10,fontFamily:ft,cursor:"pointer",marginTop:2}}>+ Add Issue</button>
        </div>

        {/* Key Events */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9,color:C.b,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Key Events This Shift</div>
          <textarea value={events} onChange={e=>setEvents(e.target.value)} placeholder="Curtailments, outages, comms losses, commissioning, anything notable..." rows={3}
            style={{...is,resize:"vertical",lineHeight:"1.5"}}/>
        </div>

        {/* Pending Actions */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Pending Actions / Follow-ups for Next Shift</div>
          <textarea value={pending} onChange={e=>setPending(e.target.value)} placeholder="Things the incoming shift needs to do or watch for..." rows={3}
            style={{...is,resize:"vertical",lineHeight:"1.5"}}/>
        </div>

        <button onClick={submit} style={{padding:"8px 24px",background:C.g,color:C.bg,border:"none",borderRadius:5,fontSize:12,fontWeight:700,fontFamily:ft,cursor:"pointer",letterSpacing:1}}>Submit Turnover</button>
      </Box>

      {/* Auto Snapshot */}
      <Box><SH color={C.p}>Auto Snapshot (Current State)</SH>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:C.bg,borderRadius:4,border:"1px solid "+C.brd}}>
            <span style={{fontSize:10,color:C.dim}}>Overall Completion</span>
            <span style={{fontSize:12,fontWeight:700,color:pct(fAll,tAll)>=90?C.g:pct(fAll,tAll)>=60?C.y:C.r}}>{pct(fAll,tAll)}%</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:C.bg,borderRadius:4,border:"1px solid "+C.brd}}>
            <span style={{fontSize:10,color:C.dim}}>Missing Logs</span>
            <span className={missingCount>0?"flash":""} style={{fontSize:12,fontWeight:700,color:missingCount>0?C.r:C.g}}>{missingCount}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:alerts.length>0?C.r+"18":C.bg,borderRadius:4,border:"1px solid "+(alerts.length>0?C.r+"44":C.brd)}}>
            <span style={{fontSize:10,color:C.dim}}>Sites in Outage</span>
            <span style={{fontSize:12,fontWeight:700,color:alerts.length>0?C.r:C.g}}>{alerts.length}</span>
          </div>
          {alerts.length>0&&<div style={{padding:"4px 10px"}}>{alerts.map((a,i)=><div key={i} style={{fontSize:10,color:C.r,padding:"2px 0"}}>{a.site}: {a.nc}/{a.max} nodes</div>)}</div>}
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:lowSoc.length>0?C.o+"18":C.bg,borderRadius:4,border:"1px solid "+(lowSoc.length>0?C.o+"44":C.brd)}}>
            <span style={{fontSize:10,color:C.dim}}>SOC Below 20%</span>
            <span style={{fontSize:12,fontWeight:700,color:lowSoc.length>0?C.o:C.g}}>{lowSoc.length}</span>
          </div>
          {lowSoc.length>0&&<div style={{padding:"4px 10px"}}>{lowSoc.map((s,i)=><div key={i} style={{fontSize:10,color:C.o,padding:"2px 0"}}>{s.site}: {s.soc}%</div>)}</div>}
        </div>
      </Box>

      {/* Turnover History */}
      <Box><SH color={C.b}>Turnover History ({turnovers.length})</SH>
        {turnovers.length===0?<div style={{fontSize:11,color:C.dim}}>No turnovers submitted today</div>:
        <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:400,overflowY:"auto"}}>
          {turnovers.slice().reverse().map((t,ri)=>{const idx=turnovers.length-1-ri;return(
            <div key={t.id||ri} style={{background:C.bg,border:"1px solid "+(t.ack?C.g+"66":C.y+"66"),borderRadius:6,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:C.white}}>{t.outgoing?.name||"--"}</span>
                  <span style={{fontSize:9,color:C.dim,marginLeft:6}}>{t.outgoing?.role}</span>
                  <span style={{fontSize:10,color:t.shiftType==="Day"?C.y:C.b,fontWeight:600,marginLeft:8}}>{t.shiftType}</span>
                </div>
                <div style={{fontSize:9,color:C.dim}}>{t.ts?new Date(t.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</div>
              </div>

              {t.issues&&t.issues.length>0&&<div style={{marginBottom:6}}>
                <div style={{fontSize:8,color:C.r,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:3}}>Issues</div>
                {t.issues.map((iss,j)=><div key={j} style={{fontSize:10,color:C.white,padding:"2px 0",display:"flex",gap:8}}>
                  <span style={{color:C.g,fontWeight:600,minWidth:100}}>{iss.site}</span>
                  <span style={{flex:1}}>{iss.issue}</span>
                  <span style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:iss.status==="Active"?C.r+"33":iss.status==="Escalated"?C.o+"33":iss.status==="Monitoring"?C.y+"33":C.g+"33",color:iss.status==="Active"?C.r:iss.status==="Escalated"?C.o:iss.status==="Monitoring"?C.y:C.g}}>{iss.status}</span>
                </div>)}
              </div>}

              {t.events&&<div style={{marginBottom:6}}>
                <div style={{fontSize:8,color:C.b,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:3}}>Key Events</div>
                <div style={{fontSize:10,color:C.txt,whiteSpace:"pre-wrap",lineHeight:"1.4"}}>{t.events}</div>
              </div>}

              {t.pending&&<div style={{marginBottom:6}}>
                <div style={{fontSize:8,color:C.o,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:3}}>Pending Actions</div>
                <div style={{fontSize:10,color:C.txt,whiteSpace:"pre-wrap",lineHeight:"1.4"}}>{t.pending}</div>
              </div>}

              {t.snapshot&&<div style={{marginBottom:6}}>
                <div style={{fontSize:8,color:C.p,fontWeight:700,textTransform:"uppercase",letterSpacing:2,marginBottom:3}}>Snapshot at Turnover</div>
                <div style={{display:"flex",gap:12,fontSize:9}}>
                  <span style={{color:C.dim}}>Completion: <span style={{color:C.white,fontWeight:600}}>{t.snapshot.completion}%</span></span>
                  <span style={{color:C.dim}}>Missing: <span style={{color:t.snapshot.missing>0?C.r:C.white,fontWeight:600}}>{t.snapshot.missing}</span></span>
                  <span style={{color:C.dim}}>Outages: <span style={{color:t.snapshot.alerts>0?C.r:C.white,fontWeight:600}}>{t.snapshot.alerts}</span></span>

                </div>

              {/* Acknowledgment */}
              <div style={{borderTop:"1px solid "+C.brd,marginTop:8,paddingTop:8}}>
                {t.ack?<div style={{display:"flex",alignItems:"center",gap:6}}>

                  <span style={{fontSize:9,color:C.dim}}>({t.ack.role}) at {new Date(t.ack.ts).toLocaleString("en-US",{hour:"2-digit",minute:"2-digit"})}</span>

// MAIN APP
// ================================================================
function App(){
  const [user,setUser]=useState(null);
  const [data,setData]=useState(()=>lsGet());
  const [selDay,setSelDay]=useState(tIdx());
  const [weekOff,setWeekOff]=useState(0);
  const [secIdx,setSecIdx]=useState(-1); // -1 = dashboard
  const [showReport,setShowReport]=useState(false);
  const [syncStatus,setSyncStatus]=useState("loading");
  const [lastSync,setLastSync]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const dataRef=useRef(data);
  useEffect(()=>{dataRef.current=data},[data]);
  const loginDayRef=useRef(null);

  // Theme — set C synchronously during render so all children see it immediately
  const [theme,setTheme]=useState(()=>localStorage.getItem("rocc_theme")||"dark");
  C=THEMES[theme]||THEMES.dark;
  useEffect(()=>{
    localStorage.setItem("rocc_theme",theme);
    document.body.className=theme==="light"?"light":"";
  },[theme]);
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");

  const now=new Date();now.setDate(now.getDate()+weekOff*7);const weekStart=getWS(now);
  const selDate=getDD(weekStart,selDay);
  const dkv=dkf(selDate);
  const sec=secIdx>=0?SECTIONS[secIdx]:null;

  // Initial load from Google Sheets
  useEffect(()=>{
    if(!isOnline){setSyncStatus("offline");setLoaded(true);return}
    setSyncStatus("loading");
    gsGetAll().then(remote=>{
      if(remote&&Object.keys(remote).length>0){
        const local=lsGet();
        const merged=deepMerge(local,remote);
        if(JSON.stringify(merged)!==JSON.stringify(local)){setData(merged);lsSet(merged)}
      }
      setSyncStatus("ok");setLastSync(Date.now());setLoaded(true);
    }).catch(()=>{setSyncStatus("error");setLoaded(true)});
  },[]);

  // Auto-refresh on all tabs to keep multi-user data in sync
  const secIdxRef=useRef(secIdx);
  useEffect(()=>{secIdxRef.current=secIdx},[secIdx]);
  useEffect(()=>{
    if(!isOnline)return;
    const iv=setInterval(()=>{
      gsGetAll().then(remote=>{
        if(remote&&Object.keys(remote).length>0){
          let changed=false;
          setData(prev=>{
            const merged=deepMerge(prev,remote);
            if(JSON.stringify(merged)===JSON.stringify(prev))return prev;
            changed=true;lsSet(merged);return merged;
          });
          if(changed){setSyncStatus("ok");setLastSync(Date.now())}
        }
      }).catch(()=>{});
    },15000);
    return()=>clearInterval(iv);
  },[isOnline]);

  // Save: local + Google Sheets (merge, then refresh)
  const persist=useCallback(async(newData)=>{
    const oldData=dataRef.current;
    dataRef.current=newData;
    setData(newData);
    lsSet(newData);
    if(!isOnline)return;
    setSyncStatus("saving");
    const changedKeys=Object.keys(newData).filter(k=>JSON.stringify(newData[k])!==JSON.stringify(oldData[k]));
    let ok=true;
    const uName=user?.name||"";
    for(const k of changedKeys){
      const result=await gsSet(k,newData[k],uName);
      if(!result)ok=false;
    }
    // After saving, pull latest from remote to pick up other users' changes
    if(ok){
      try{
        const remote=await gsGetAll();
        if(remote&&Object.keys(remote).length>0){
          const merged=deepMerge(newData,remote);
          dataRef.current=merged;
          setData(merged);
          lsSet(merged);
        }
      }catch{}
    }
    setSyncStatus(ok?"ok":"error");
    if(ok)setLastSync(Date.now());
  },[isOnline,user]);

  // Log shift on login
  useEffect(()=>{
    if(!user||!loaded)return;
    if(!loginDayRef.current)loginDayRef.current=dkf(new Date());
    const ldk=loginDayRef.current;
    const cur=dataRef.current;
    const dd=cur[ldk];const shifts=dd?.shifts||[];
    if(!shifts.some(s=>s.name===user.name&&s.shift===user.shift)){
      persist({...cur,[ldk]:{...dd,shifts:[...shifts,user]}});
    }
  },[user,loaded,persist]);

  const saveSection=(dayKey,sectionKey,sectionData)=>{
    const cur=dataRef.current;
    const existing=cur[dayKey]?.[sectionKey]||{};
    const merged={...existing};
    Object.entries(sectionData).forEach(([siteId,siteSlots])=>{
      merged[siteId]={...(merged[siteId]||{})};
      Object.entries(siteSlots).forEach(([slot,fields])=>{
        merged[siteId][slot]={...(merged[siteId]?.[slot]||{}),...fields};
      });
    });
    persist({...cur,[dayKey]:{...cur[dayKey],[sectionKey]:merged}});
  };

  const exportCSV=()=>{
    const dd=dataRef.current[dkv]||{};
    let csv="Section,Site,Time Slot,Field,Value,Logged By,Logged At\n";
    SECTIONS.forEach(sec=>{
      const sd=dd[sec.id]||{};
      sec.sites.forEach(site=>{
        sec.slots.forEach((sl,si)=>{
          const slotData=sd[site.id]?.[sl];
          if(slotData){
            sec.fields.forEach(f=>{
              const v=slotData[f.id];
              if(v!=null&&v!==""){
                const who=slotData._user||"";
                const when=slotData._ts?new Date(slotData._ts).toLocaleString("en-US"):"";
                csv+='"'+[sec.label,site.n,sec.slotLabels[si],f.label,v,who,when].join('","')+'"\n';
              }
            });
          }
        });
      });
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="ROCC_Data_"+dkv+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const saveNote=(dayKey,note)=>{
    const cur=dataRef.current;
    const dd=cur[dayKey]||{};
    const notes=dd.notes||[];
    persist({...cur,[dayKey]:{...dd,notes:[...notes,note]}});
  };

  const saveTurnover=(dayKey,turnover,fullList)=>{
    const cur=dataRef.current;
    const dd=cur[dayKey]||{};
    if(fullList){
      // Replacing the full turnovers array (for acknowledgment updates)
      persist({...cur,[dayKey]:{...dd,turnovers:fullList}});
    }else if(turnover){
      // Appending a new turnover
      const turnovers=dd.turnovers||[];
      persist({...cur,[dayKey]:{...dd,turnovers:[...turnovers,turnover]}});
    }
  };

  // Midnight report alarm
  const [midnightAlert,setMidnightAlert]=useState(false);
  const midnightDismissed=useRef(null);
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      const n=new Date();
      const h=n.getHours(),m=n.getMinutes();
      const todayStr=dkf(n);
      // Trigger between 23:55 and 00:05
      if((h===23&&m>=55)||(h===0&&m<=5)){
        if(midnightDismissed.current!==todayStr){
          setMidnightAlert(true);
        }
      }
    };
    check();
    const iv=setInterval(check,30000); // check every 30 seconds
    return()=>clearInterval(iv);
  },[user]);
  const dismissMidnight=()=>{
    midnightDismissed.current=dkf(new Date());
    setMidnightAlert(false);
  };
  const midnightDownload=()=>{
    // Download report for today (or yesterday if just past midnight)
    const n=new Date();
    const reportDk=n.getHours()===0?dkf(new Date(n.getTime()-86400000)):dkf(n);
    setShowReport(true);
    dismissMidnight();
  };

  const switchOp=()=>setUser(null);
  const reset=()=>{if(confirm("Clear ALL local data? This cannot be undone.")){setData({});lsSet({})}};

  const refreshNow=async()=>{
    if(!isOnline)return;
    setSyncStatus("loading");
    const remote=await gsGetAll();
    if(remote){
      const merged=deepMerge(dataRef.current,remote);
      const changed=JSON.stringify(merged)!==JSON.stringify(dataRef.current);
      if(changed){dataRef.current=merged;setData(merged);lsSet(merged)}
      setSyncStatus("ok");setLastSync(Date.now());
    }
    else setSyncStatus("error");
  };

  if(!user)return <Login onLogin={setUser} onToggleTheme={toggleTheme} theme={theme}/>;
  if(!loaded)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:ft}}><div style={{textAlign:"center"}}><div className="sp" style={{width:20,height:20,marginBottom:12}}/><div style={{color:C.g,fontSize:13}}>Syncing with Google Sheets...</div></div></div>;

  const todayDk=dkf(new Date());

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt,fontFamily:ft}}>
      {/* HEADER */}
      <div style={{background:C.s,borderBottom:"1px solid "+C.brd,padding:"7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div><span style={{fontSize:8,letterSpacing:4,color:C.g,textTransform:"uppercase"}}>ROCC</span><span style={{fontSize:12,fontWeight:700,color:C.white,marginLeft:5}}>Ops Log</span></div>
          {/* Sync indicator */}
          <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}} onClick={refreshNow} title="Click to refresh from Google Sheets">
            {syncStatus==="ok"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.g}}/><span style={{fontSize:9,color:C.g}}>Synced{lastSync?" "+fT(lastSync):""}</span></>}
            {syncStatus==="saving"&&<><div className="sp"/><span style={{fontSize:9,color:C.y}}>Saving...</span></>}
            {syncStatus==="loading"&&<><div className="sp"/><span style={{fontSize:9,color:C.y}}>Loading...</span></>}
            {syncStatus==="error"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.r}}/><span style={{fontSize:9,color:C.r}}>Sync Error - Click to retry</span></>}
            {syncStatus==="offline"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.o}}/><span style={{fontSize:9,color:C.o}}>Local Only</span></>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setWeekOff(w=>w-1)} style={{padding:"3px 7px",background:C.bg,border:"1px solid "+C.brd,borderRadius:3,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{"\u2190"}</button>
          <button onClick={()=>setWeekOff(0)} style={{padding:"3px 8px",background:weekOff===0?C.gd:C.bg,border:"1px solid "+(weekOff===0?C.g:C.brd),borderRadius:3,color:weekOff===0?C.g:C.txt,fontSize:10,fontFamily:ft,cursor:"pointer"}}>This Wk</button>
          <button onClick={()=>setWeekOff(w=>w+1)} style={{padding:"3px 7px",background:C.bg,border:"1px solid "+C.brd,borderRadius:3,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{"\u2192"}</button>
          <div style={{width:1,height:18,background:C.brd}}/>
          <button onClick={()=>setShowReport(true)} style={{padding:"5px 10px",background:C.b,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Report</button>
          <button onClick={exportCSV} style={{padding:"5px 10px",background:C.o,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Export CSV</button>
          <button onClick={switchOp} style={{padding:"5px 10px",background:C.p,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Switch Op</button>
          <button onClick={toggleTheme} title={theme==="dark"?"Switch to Light Mode":"Switch to Dark Mode"} style={{padding:"5px 8px",background:"transparent",border:"1px solid "+C.brd,borderRadius:4,color:C.dim,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{theme==="dark"?"\u2600":"🌙"}</button>
          <button onClick={reset} style={{padding:"5px 7px",background:"transparent",border:"1px solid "+C.brd,borderRadius:4,color:C.dim,fontSize:9,fontFamily:ft,cursor:"pointer"}}>Reset</button>
          <div style={{fontSize:10,color:C.dim}}><span style={{color:C.white,fontWeight:600}}>{user.name}</span>/{user.shift}</div>
        </div>
      </div>

      <div style={{padding:"10px 14px",maxWidth:1500,margin:"0 auto"}}>
        {/* DAY TABS */}
        <div style={{display:"flex",gap:2,marginBottom:8}}>
          {DS.map((d,i)=>{
            const dt=getDD(weekStart,i);const idk=dkf(dt);const isToday=idk===todayDk;const isSel=i===selDay;const hasD=!!data[idk];
            return(<button key={d} onClick={()=>setSelDay(i)} style={{flex:1,padding:"6px 2px",background:isSel?C.gd:hasD?C.s2:C.s,border:"2px solid "+(isSel?C.g:isToday?C.g+"88":hasD?C.brd2:C.brd),borderRadius:4,cursor:"pointer",position:"relative"}}>
              <div style={{fontSize:10,fontWeight:700,color:isSel?C.g:isToday?C.white:C.dim,fontFamily:ft}}>{d}</div>
              <div style={{fontSize:7,color:isSel?C.g:C.dim}}>{fS(dt)}</div>
              {isToday&&!isSel&&<div style={{position:"absolute",top:-1,right:-1,width:5,height:5,borderRadius:"50%",background:C.g}}/>}
            </button>);
          })}
        </div>

        {/* SECTION TABS */}
        <div style={{display:"flex",gap:2,marginBottom:10,flexWrap:"wrap"}}>
          <button onClick={()=>setSecIdx(-1)} style={{padding:"5px 12px",background:secIdx===-1?C.g+"22":"transparent",border:"1px solid "+(secIdx===-1?C.g:C.brd),borderRadius:4,color:secIdx===-1?C.g:C.dim,fontSize:10,fontFamily:ft,cursor:"pointer",fontWeight:secIdx===-1?700:400}}>Dashboard</button>
          <button onClick={()=>setSecIdx(-2)} style={{padding:"5px 12px",background:secIdx===-2?C.y+"22":"transparent",border:"1px solid "+(secIdx===-2?C.y:C.brd),borderRadius:4,color:secIdx===-2?C.y:C.dim,fontSize:10,fontFamily:ft,cursor:"pointer",fontWeight:secIdx===-2?700:400}}>Turnover</button>
          {SECTIONS.map((s,i)=><button key={s.id} onClick={()=>setSecIdx(i)} style={{padding:"5px 10px",background:i===secIdx?s.color+"22":"transparent",border:"1px solid "+(i===secIdx?s.color:C.brd),borderRadius:4,color:i===secIdx?s.color:C.dim,fontSize:10,fontFamily:ft,cursor:"pointer",fontWeight:i===secIdx?700:400,whiteSpace:"nowrap"}}>{s.label}</button>)}
        </div>

        {/* CONTENT */}
        {secIdx===-1
          ? <Dashboard data={data} dayKey={dkv} user={user} onSaveNote={(note)=>saveNote(dkv,note)}/>
          : secIdx===-2
          ? <Turnover data={data} dayKey={dkv} user={user} onSave={saveTurnover}/>
          : <div>
              <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:6}}>
                {DAYS[selDay]} {fS(selDate)} - {sec.label} <span style={{fontSize:10,fontWeight:400,color:C.dim}}>({sec.desc})</span>
              </div>
              <FastGrid key={sec.id+dkv} sectionKey={sec.id} sites={sec.sites} slots={sec.slots} slotLabels={sec.slotLabels} fields={sec.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={sec.siteExtra}/>
            </div>
        }
      </div>

      {/* Midnight Report Alarm */}
      {midnightAlert&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
        <div className="alarm-box" style={{background:C.s,border:"2px solid "+C.r,borderRadius:10,padding:"30px 40px",maxWidth:440,textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:8}}>&#9200;</div>
          <div style={{fontSize:16,fontWeight:700,color:C.r,marginBottom:6,fontFamily:ft}}>END OF DAY</div>
          <div style={{fontSize:12,color:C.white,marginBottom:4,fontFamily:ft}}>It's midnight — time to save today's report.</div>
          <div style={{fontSize:10,color:C.dim,marginBottom:20,fontFamily:ft}}>Download the daily report and/or CSV before the day rolls over.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={midnightDownload} style={{padding:"10px 20px",background:C.g,color:C.bg,border:"none",borderRadius:5,fontSize:12,fontWeight:700,fontFamily:ft,cursor:"pointer",letterSpacing:1}}>Open Report</button>
            <button onClick={()=>{exportCSV();dismissMidnight()}} style={{padding:"10px 20px",background:C.o,color:"#fff",border:"none",borderRadius:5,fontSize:12,fontWeight:700,fontFamily:ft,cursor:"pointer",letterSpacing:1}}>Export CSV</button>
            <button onClick={dismissMidnight} style={{padding:"10px 20px",background:"transparent",border:"1px solid "+C.brd,borderRadius:5,color:C.dim,fontSize:12,fontFamily:ft,cursor:"pointer"}}>Dismiss</button>
          </div>
          <div style={{fontSize:9,color:C.dim,marginTop:14,fontFamily:ft}}>This alert appears once between 23:55 and 00:05</div>
        </div>
      </div>}

      {showReport&&<Report data={data} dayKey={dkv} user={user} onClose={()=>setShowReport(false)}/>}
      <div style={{textAlign:"center",padding:"12px 0",fontSize:9,color:C.dim,borderTop:"1px solid "+C.brd,marginTop:12}}>ROCC Operations Log v4.0 | AES Clean Energy | Developed by Rocky Dev Co.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
