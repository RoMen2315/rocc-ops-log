function Turnover({data,dayKey:dkv,user,onSave}){
  const key="turnover_"+dkv;
  const saved=data[key];
  const seed=dkv==="2026-04-02"?TURNOVER_SEED:{date:dkv,dayCrew:"",nightCrew:"",newThisShift:[],upcomingItems:[],ongoingReminders:[],siteAvailability:TURNOVER_SEED.siteAvailability};
  const init=saved||seed;

  const [dayCrew,setDayCrew]=useState(init.dayCrew||"");
  const [nightCrew,setNightCrew]=useState(init.nightCrew||"");
  const [newItems,setNewItems]=useState(init.newThisShift||[]);
  const [upcoming,setUpcoming]=useState(init.upcomingItems||[]);
  const [ongoing,setOngoing]=useState(init.ongoingReminders||[]);
  const [avail,setAvail]=useState(init.siteAvailability||[]);
  const [newInput,setNewInput]=useState("");
  const [upInput,setUpInput]=useState("");
  const [onInput,setOnInput]=useState("");

  const save=(updates)=>{
    const d={date:dkv,dayCrew,nightCrew,newThisShift:newItems,upcomingItems:upcoming,ongoingReminders:ongoing,siteAvailability:avail,...updates};
    onSave(key,d);
  };

  const is={width:"100%",padding:"8px 10px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:4,color:C.white,fontSize:11,fontFamily:ft,outline:"none"};

  const ListSection=({title,color,items,setItems,input,setInput})=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:10,color:color,textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:700}}>{title} ({items.length})</div>
      <div style={{background:C.bg,border:"1px solid "+C.brd,borderRadius:5,padding:8,maxHeight:250,overflow:"auto"}}>
        {items.map((item,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"4px 0",borderBottom:"1px solid "+C.brd}}>
          <div style={{color:C.g,fontSize:10,marginTop:2,flexShrink:0}}>*</div>
          <div style={{flex:1,fontSize:10,color:C.white,lineHeight:1.4}}>{typeof item==="object"?item.text:item}</div>
          <button onClick={()=>{const n=items.filter((_,j)=>j!==i);setItems(n)}} style={{background:"none",border:"none",color:C.r,fontSize:10,cursor:"pointer",flexShrink:0,padding:"0 2px"}}>x</button>
        </div>)}
        {items.length===0&&<div style={{fontSize:10,color:C.dim,padding:4}}>No items</div>}
      </div>
      <div style={{display:"flex",gap:4,marginTop:4}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const n=[...items,input.trim()];setItems(n);setInput("")}}} placeholder={"Add "+title.toLowerCase()+"..."} style={{...is,flex:1,fontSize:10}}/>
        <button onClick={()=>{if(input.trim()){const n=[...items,input.trim()];setItems(n);setInput("")}}} style={{padding:"4px 10px",background:C.g,color:C.bg,border:"none",borderRadius:4,fontSize:9,fontFamily:ft,cursor:"pointer"}}>+</button>
      </div>
    </div>
  );

  return <div>
    {/* Header */}
    <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{fontSize:13,fontWeight:700,color:C.white}}>Shift Turnover - {dkv}</div>
      <button onClick={()=>save({newThisShift:newItems,upcomingItems:upcoming,ongoingReminders:ongoing,siteAvailability:avail})} style={{padding:"4px 14px",background:C.g,color:C.bg,border:"none",borderRadius:4,fontSize:10,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Save Turnover</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <div><div style={{fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Day Crew</div>
        <input value={dayCrew} onChange={e=>setDayCrew(e.target.value)} style={is} placeholder="Day crew names..."/></div>
      <div><div style={{fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>Night Crew</div>
        <input value={nightCrew} onChange={e=>setNightCrew(e.target.value)} style={is} placeholder="Night crew names..."/></div>
    </div>

    {/* Two column layout */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:12}}>
      <div>
        <ListSection title="New This Shift" color={C.y} items={newItems} setItems={setNewItems} input={newInput} setInput={setNewInput}/>
        <ListSection title="Upcoming Items" color={C.b} items={upcoming} setItems={setUpcoming} input={upInput} setInput={setUpInput}/>
        <ListSection title="Ongoing Reminders" color={C.o} items={ongoing} setItems={setOngoing} input={onInput} setInput={setOnInput}/>
      </div>
      <div>
        <div style={{fontSize:10,color:C.p,textTransform:"uppercase",letterSpacing:2,marginBottom:8,fontWeight:700}}>Site Availability</div>
        <div style={{background:C.bg,border:"1px solid "+C.brd,borderRadius:5,overflow:"hidden"}}>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr>
              <th style={{padding:"6px 8px",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd,textAlign:"left"}}>Site</th>
              <th style={{padding:"6px 8px",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd,textAlign:"center"}}>PV MW</th>
              <th style={{padding:"6px 8px",fontSize:8,color:C.dim,textTransform:"uppercase",letterSpacing:2,borderBottom:"1px solid "+C.brd,textAlign:"center"}}>BESS MW</th>
            </tr></thead>
            <tbody>{avail.map((a,i)=><tr key={i}>
              <td style={{padding:"4px 8px",fontSize:10,color:C.white,borderBottom:"1px solid "+C.brd,fontWeight:600}}>{a.site}</td>
              <td style={{padding:"4px 8px",borderBottom:"1px solid "+C.brd,textAlign:"center"}}>
                <input type="number" value={a.pv||""} onChange={e=>{const n=[...avail];n[i]={...n[i],pv:e.target.value?parseFloat(e.target.value):null};setAvail(n)}} style={{width:50,padding:"2px 4px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:3,color:C.white,fontSize:10,fontFamily:ft,textAlign:"center",outline:"none"}} placeholder="-"/>
              </td>
              <td style={{padding:"4px 8px",borderBottom:"1px solid "+C.brd,textAlign:"center"}}>
                <input type="number" value={a.bess||""} onChange={e=>{const n=[...avail];n[i]={...n[i],bess:e.target.value?parseFloat(e.target.value):null};setAvail(n)}} style={{width:50,padding:"2px 4px",background:C.inputBg,border:"1px solid "+C.brd,borderRadius:3,color:C.white,fontSize:10,fontFamily:ft,textAlign:"center",outline:"none"}} placeholder="-"/>
              </td>
            </tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>;
}

function App(){
  const [user,setUser]=useState(()=>{try{const s=sessionStorage.getItem("rocc_user");return s?JSON.parse(s):null}catch{return null}});
  const [data,setData]=useState(()=>lsGet());
  const [selDay,setSelDay]=useState(tIdx());
  const [weekOff,setWeekOff]=useState(0);
  const [secIdx,setSecIdx]=useState(-1); // -1 = dashboard
  const [showReport,setShowReport]=useState(false);
  const [syncStatus,setSyncStatus]=useState("loading");
  const [lastSync,setLastSync]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [sitePopup,setSitePopup]=useState(null);
  const dataRef=useRef(data);
  useEffect(()=>{dataRef.current=data},[data]);
  useEffect(()=>{window._openSitePopup=setSitePopup;return()=>{delete window._openSitePopup}},[]);
  const loginDayRef=useRef(null);

  // Theme — set C synchronously during render so all children see it immediately
  const [theme,setTheme]=useState(()=>localStorage.getItem("rocc_theme")||"dark");
  C=THEMES[theme]||THEMES.dark;
  useEffect(()=>{
    localStorage.setItem("rocc_theme",theme);
    document.body.className=theme==="light"?"light":"";
  },[theme]);
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");

  const now=new Date();now.setDate(now.getDate()+weekOff*7);const weekStart=getWS(now);
  const selDate=getDD(weekStart,selDay);
  const dkv=dkf(selDate);
  const sec=secIdx>=0?SECTIONS[secIdx]:null;

  // Initial load from Google Sheets
  useEffect(()=>{
    if(!isOnline){setSyncStatus("offline");setLoaded(true);return}
    setSyncStatus("loading");
    gsGetAll().then(remote=>{
      console.log("[ROCC init] Remote data:",remote?Object.keys(remote):"null");
      if(remote&&Object.keys(remote).length>0){
        const today=dkf(new Date());
        console.log("[ROCC init] Today key:",today,"shifts:",remote[today]?.shifts);
        const local=lsGet();
        const merged=deepMerge(local,remote);
        setData(merged);lsSet(merged);
      }
      setSyncStatus("ok");setLastSync(Date.now());setLoaded(true);
    }).catch(e=>{console.error("[ROCC init] Error",e);setSyncStatus("error");setLoaded(true)});
  },[]);

  // Auto-refresh on all tabs to keep multi-user data in sync
  const secIdxRef=useRef(secIdx);
  useEffect(()=>{secIdxRef.current=secIdx},[secIdx]);
  useEffect(()=>{
    if(!isOnline)return;
    const iv=setInterval(()=>{
      gsGetAll().then(remote=>{
        if(remote&&Object.keys(remote).length>0){
          console.log("[ROCC sync] Remote keys:",Object.keys(remote),"shifts:",Object.values(remote).map(v=>v?.shifts?.length||0));
          setData(prev=>{
            const merged=deepMerge(prev,remote);
            if(JSON.stringify(merged)===JSON.stringify(prev)){console.log("[ROCC sync] No changes");return prev}
            console.log("[ROCC sync] Data updated");
            lsSet(merged);
            setSyncStatus("ok");setLastSync(Date.now());
            return merged;
          });
        }else{console.log("[ROCC sync] Empty response")}
      }).catch(e=>{console.error("[ROCC sync] Error",e)});
    },15000);
    return()=>clearInterval(iv);
  },[isOnline]);

  // Save: local + Google Sheets (merge, then refresh)
  const persist=useCallback(async(newData)=>{
    const oldData=dataRef.current;
    dataRef.current=newData;
    setData(newData);
    lsSet(newData);
    if(!isOnline)return;
    setSyncStatus("saving");
    const changedKeys=Object.keys(newData).filter(k=>JSON.stringify(newData[k])!==JSON.stringify(oldData[k]));
    let ok=true;
    const uName=user?.name||"";
    for(const k of changedKeys){
      const result=await gsSet(k,newData[k],uName);
      if(!result)ok=false;
    }
    // After saving, pull latest from remote to pick up other users' changes
    if(ok){
      try{
        const remote=await gsGetAll();
        if(remote&&Object.keys(remote).length>0){
          const merged=deepMerge(newData,remote);
          dataRef.current=merged;
          setData(merged);
          lsSet(merged);
        }
      }catch{}
    }
    setSyncStatus(ok?"ok":"error");
    if(ok)setLastSync(Date.now());
  },[isOnline,user]);

  // Log shift on login
  useEffect(()=>{
    if(!user||!loaded)return;
    if(!loginDayRef.current)loginDayRef.current=dkf(new Date());
    const ldk=loginDayRef.current;
    const cur=dataRef.current;
    const dd=cur[ldk];const shifts=dd?.shifts||[];
    if(!shifts.some(s=>s.name===user.name&&s.shift===user.shift)){
      persist({...cur,[ldk]:{...dd,shifts:[...shifts,user]}});
    }
  },[user,loaded,persist]);

  const saveSection=(dayKey,sectionKey,sectionData)=>{
    const cur=dataRef.current;
    const existing=cur[dayKey]?.[sectionKey]||{};
    const merged={...existing};
    Object.entries(sectionData).forEach(([siteId,siteSlots])=>{
      merged[siteId]={...(merged[siteId]||{})};
      Object.entries(siteSlots).forEach(([slot,fields])=>{
        merged[siteId][slot]={...(merged[siteId]?.[slot]||{}),...fields};
      });
    });
    persist({...cur,[dayKey]:{...cur[dayKey],[sectionKey]:merged}});
  };

  const exportCSV=()=>{
    const dd=dataRef.current[dkv]||{};
    let csv="Section,Site,Time Slot,Field,Value,Logged By,Logged At\n";
    SECTIONS.forEach(sec=>{
      const sd=dd[sec.id]||{};
      sec.sites.forEach(site=>{
        sec.slots.forEach((sl,si)=>{
          const slotData=sd[site.id]?.[sl];
          if(slotData){
            sec.fields.forEach(f=>{
              const v=slotData[f.id];
              if(v!=null&&v!==""){
                const who=slotData._user||"";
                const when=slotData._ts?new Date(slotData._ts).toLocaleString("en-US"):"";
                csv+='"'+[sec.label,site.n,sec.slotLabels[si],f.label,v,who,when].join('","')+'"\n';
              }
            });
          }
        });
      });
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="ROCC_Data_"+dkv+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const saveNote=(dayKey,note)=>{
    const cur=dataRef.current;
    const dd=cur[dayKey]||{};
    const notes=dd.notes||[];
    persist({...cur,[dayKey]:{...dd,notes:[...notes,note]}});
  };

  const saveTurnover=(dayKey,turnover,fullList)=>{
    const cur=dataRef.current;
    const dd=cur[dayKey]||{};
    if(fullList){
      // Replacing the full turnovers array (for acknowledgment updates)
      persist({...cur,[dayKey]:{...dd,turnovers:fullList}});
    }else if(turnover){
      // Appending a new turnover
      const turnovers=dd.turnovers||[];
      persist({...cur,[dayKey]:{...dd,turnovers:[...turnovers,turnover]}});
    }
  };

  // Midnight report alarm
  const [midnightAlert,setMidnightAlert]=useState(false);
  const midnightDismissed=useRef(null);
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      const n=new Date();
      const h=n.getHours(),m=n.getMinutes();
      const todayStr=dkf(n);
      // Trigger between 23:55 and 00:05
      if((h===23&&m>=55)||(h===0&&m<=5)){
        if(midnightDismissed.current!==todayStr){
          setMidnightAlert(true);
        }
      }
    };
    check();
    const iv=setInterval(check,30000); // check every 30 seconds
    return()=>clearInterval(iv);
  },[user]);
  const dismissMidnight=()=>{
    midnightDismissed.current=dkf(new Date());
    setMidnightAlert(false);
  };
  const midnightDownload=()=>{
    // Download report for today (or yesterday if just past midnight)
    const n=new Date();
    const reportDk=n.getHours()===0?dkf(new Date(n.getTime()-86400000)):dkf(n);
    setShowReport(true);
    dismissMidnight();
  };

  const switchOp=()=>{setUser(null);try{sessionStorage.removeItem("rocc_user")}catch{}};
  const reset=()=>{if(confirm("Clear ALL local data? This cannot be undone.")){setData({});lsSet({})}};

  const refreshNow=async()=>{
    if(!isOnline)return;
    setSyncStatus("loading");
    const remote=await gsGetAll();
    if(remote){
      const merged=deepMerge(dataRef.current,remote);
      const changed=JSON.stringify(merged)!==JSON.stringify(dataRef.current);
      if(changed){dataRef.current=merged;setData(merged);lsSet(merged)}
      setSyncStatus("ok");setLastSync(Date.now());
    }
    else setSyncStatus("error");
  };

  if(!user)return <Login onLogin={(u)=>{setUser(u);try{sessionStorage.setItem("rocc_user",JSON.stringify(u))}catch{}}} onToggleTheme={toggleTheme} theme={theme}/>;
  if(!loaded)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:ft}}><div style={{textAlign:"center"}}><div className="sp" style={{width:20,height:20,marginBottom:12}}/><div style={{color:C.g,fontSize:13}}>Syncing with Google Sheets...</div></div></div>;

  const todayDk=dkf(new Date());

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt,fontFamily:ft}}>
      {/* HEADER */}
      <div style={{background:C.s,borderBottom:"1px solid "+C.brd,padding:"7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div><span style={{fontSize:8,letterSpacing:4,color:C.g,textTransform:"uppercase"}}>ROCC</span><span style={{fontSize:12,fontWeight:700,color:C.white,marginLeft:5}}>Ops Log</span></div>
          {/* Sync indicator */}
          <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}} onClick={refreshNow} title="Click to refresh from Google Sheets">
            {syncStatus==="ok"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.g}}/><span style={{fontSize:9,color:C.g}}>Synced{lastSync?" "+fT(lastSync):""}</span></>}
            {syncStatus==="saving"&&<><div className="sp"/><span style={{fontSize:9,color:C.y}}>Saving...</span></>}
            {syncStatus==="loading"&&<><div className="sp"/><span style={{fontSize:9,color:C.y}}>Loading...</span></>}
            {syncStatus==="error"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.r}}/><span style={{fontSize:9,color:C.r}}>Sync Error - Click to retry</span></>}
            {syncStatus==="offline"&&<><div style={{width:6,height:6,borderRadius:"50%",background:C.o}}/><span style={{fontSize:9,color:C.o}}>Local Only</span></>}
          </div>
          {(()=>{const ac=Array.isArray(data.outages)?data.outages.filter(o=>o.status==="ACTIVE").length:0;return ac>0?<span style={{padding:"2px 8px",borderRadius:10,background:C.r+"33",color:C.r,fontSize:9,fontWeight:700,marginLeft:6}}>{ac} Outage{ac>1?"s":""}</span>:null})()}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setWeekOff(w=>w-1)} style={{padding:"3px 7px",background:C.bg,border:"1px solid "+C.brd,borderRadius:3,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{"\u2190"}</button>
          <button onClick={()=>setWeekOff(0)} style={{padding:"3px 8px",background:weekOff===0?C.gd:C.bg,border:"1px solid "+(weekOff===0?C.g:C.brd),borderRadius:3,color:weekOff===0?C.g:C.txt,fontSize:10,fontFamily:ft,cursor:"pointer"}}>This Wk</button>
          <button onClick={()=>setWeekOff(w=>w+1)} style={{padding:"3px 7px",background:C.bg,border:"1px solid "+C.brd,borderRadius:3,color:C.txt,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{"\u2192"}</button>
          <div style={{width:1,height:18,background:C.brd}}/>
          <button onClick={()=>setShowReport(true)} style={{padding:"5px 10px",background:C.b,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Report</button>
          <button onClick={exportCSV} style={{padding:"5px 10px",background:C.o,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Export CSV</button>
          <button onClick={switchOp} style={{padding:"5px 10px",background:C.p,color:C.white,border:"none",borderRadius:4,fontSize:9,fontWeight:700,fontFamily:ft,cursor:"pointer"}}>Switch Op</button>
          <button onClick={toggleTheme} title={theme==="dark"?"Switch to Light Mode":"Switch to Dark Mode"} style={{padding:"5px 8px",background:"transparent",border:"1px solid "+C.brd,borderRadius:4,color:C.dim,fontSize:11,fontFamily:ft,cursor:"pointer"}}>{theme==="dark"?"\u2600":"🌙"}</button>
          <button onClick={reset} style={{padding:"5px 7px",background:"transparent",border:"1px solid "+C.brd,borderRadius:4,color:C.dim,fontSize:9,fontFamily:ft,cursor:"pointer"}}>Reset</button>
          <div style={{fontSize:10,color:C.dim}}><span style={{color:C.white,fontWeight:600}}>{user.name}</span>/{user.shift}</div>
        </div>
      </div>

      <div style={{padding:"10px 14px",maxWidth:1500,margin:"0 auto"}}>
        {/* DAY TABS */}
        <div style={{display:"flex",gap:2,marginBottom:8}}>
          {DS.map((d,i)=>{
            const dt=getDD(weekStart,i);const idk=dkf(dt);const isToday=idk===todayDk;const isSel=i===selDay;const hasD=!!data[idk];
            return(<button key={d} onClick={()=>setSelDay(i)} style={{flex:1,padding:"6px 2px",background:isSel?C.gd:hasD?C.s2:C.s,border:"2px solid "+(isSel?C.g:isToday?C.g+"88":hasD?C.brd2:C.brd),borderRadius:4,cursor:"pointer",position:"relative"}}>
              <div style={{fontSize:10,fontWeight:700,color:isSel?C.g:isToday?C.white:C.dim,fontFamily:ft}}>{d}</div>
              <div style={{fontSize:7,color:isSel?C.g:C.dim}}>{fS(dt)}</div>
              {isToday&&!isSel&&<div style={{position:"absolute",top:-1,right:-1,width:5,height:5,borderRadius:"50%",background:C.g}}/>}
            </button>);
          })}
        </div>

        {/* SECTION TABS - Grouped */}
        {(()=>{
          const tb=(idx,label,color,badge)=><button key={idx} onClick={()=>setSecIdx(idx)} style={{padding:"5px 12px",background:secIdx===idx?color+"22":"transparent",border:"1px solid "+(secIdx===idx?color:C.brd),borderRadius:4,color:secIdx===idx?color:C.dim,fontSize:10,fontFamily:ft,cursor:"pointer",fontWeight:secIdx===idx?700:400,whiteSpace:"nowrap"}}>{label}{badge||null}</button>;
          const sep=<div style={{width:1,background:C.brd,margin:"2px 4px"}}/>;
          const activeOut=Array.isArray(data.outages)?data.outages.filter(o=>o.status==="ACTIVE").length:0;
          return <div style={{display:"flex",gap:2,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
            {tb(-1,"Dashboard",C.g)}
            {tb(-2,"Turnover",C.y)}
            {sep}
            {tb(-10,"BESS",C.g)}
            {tb(-11,"CA Solar",C.o)}
            {tb(-12,"Other Sites",C.p)}
            {tb(-13,"Substations",C.dim)}
            {sep}
            {tb(-6,"Outage Charts",C.b)}
            {tb(-5,"Outage Log",C.b,activeOut>0?<span style={{marginLeft:4,padding:"1px 5px",borderRadius:8,background:C.r,color:"#fff",fontSize:8}}>{activeOut}</span>:null)}
            {tb(-4,"Compliance",C.r)}
            {sep}
            {tb(-7,"Availability",C.p)}
            {tb(-3,"Site Reference",C.o)}
          </div>;
        })()}

        {/* CONTENT */}
        {secIdx===-1
          ? <Dashboard data={data} dayKey={dkv} user={user} onSaveNote={(note)=>saveNote(dkv,note)} onRemoveShift={(idx)=>{const cur=dataRef.current;const dd=cur[dkv]||{};const shifts=[...(dd.shifts||[])];shifts.splice(idx,1);persist({...cur,[dkv]:{...dd,shifts}})}}/>
          : secIdx===-2
          ? <Turnover data={data} dayKey={dkv} user={user} onSave={(key,val)=>{const cur=dataRef.current;persist({...cur,[key]:val});}}/>
          : secIdx===-7
          ? <AvailabilityMatrix data={data} user={user} onSave={(updates)=>{const cur=dataRef.current;persist({...cur,...updates});}}/>
          : secIdx===-3
          ? <SiteReference/>
          : secIdx===-4
          ? <VAR002 data={data} user={user} onSave={(updates)=>{
              const cur=dataRef.current;
              persist({...cur,...updates});
            }}/>
          : secIdx===-6
          ? <OutageCharts data={data}/>
          : secIdx===-5
          ? <OutageTracker data={data} user={user} onSave={(updates)=>{const cur=dataRef.current;persist({...cur,...updates});}}/>
          : secIdx===-10
          ? <div>
              <div style={{fontSize:13,fontWeight:700,color:C.g,marginBottom:10}}>BESS Logs - {DAYS[selDay]} {fS(selDate)}</div>
              {[0,1].map(i=>{const s=SECTIONS[i];return <div key={s.id} style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:s.color,marginBottom:4}}>{s.label} <span style={{fontSize:9,fontWeight:400,color:C.dim}}>({s.desc})</span></div>
                <FastGrid key={s.id+dkv} sectionKey={s.id} sites={s.sites} slots={s.slots} slotLabels={s.slotLabels} fields={s.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={s.siteExtra}/>
              </div>})}
            </div>
          : secIdx===-11
          ? <div>
              <div style={{fontSize:13,fontWeight:700,color:C.o,marginBottom:10}}>CA Solar Logs - {DAYS[selDay]} {fS(selDate)}</div>
              {[2,3,4,5].map(i=>{const s=SECTIONS[i];return <div key={s.id} style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:s.color,marginBottom:4}}>{s.label} <span style={{fontSize:9,fontWeight:400,color:C.dim}}>({s.desc})</span></div>
                <FastGrid key={s.id+dkv} sectionKey={s.id} sites={s.sites} slots={s.slots} slotLabels={s.slotLabels} fields={s.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={s.siteExtra}/>
              </div>})}
            </div>
          : secIdx===-12
          ? <div>
              <div style={{fontSize:13,fontWeight:700,color:C.p,marginBottom:10}}>Other Site Logs - {DAYS[selDay]} {fS(selDate)}</div>
              {[6,7,8,9,10,11,12,13].map(i=>{const s=SECTIONS[i];return <div key={s.id} style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:s.color,marginBottom:4}}>{s.label} <span style={{fontSize:9,fontWeight:400,color:C.dim}}>({s.desc})</span></div>
                <FastGrid key={s.id+dkv} sectionKey={s.id} sites={s.sites} slots={s.slots} slotLabels={s.slotLabels} fields={s.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={s.siteExtra}/>
              </div>})}
            </div>
          : secIdx===-13
          ? <div>
              <div style={{fontSize:13,fontWeight:700,color:C.dim,marginBottom:10}}>Substation Breaker Checks - {DAYS[selDay]} {fS(selDate)}</div>
              {(()=>{const s=SECTIONS[14];return <FastGrid key={s.id+dkv} sectionKey={s.id} sites={s.sites} slots={s.slots} slotLabels={s.slotLabels} fields={s.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={s.siteExtra}/>})()}
            </div>
          : <div>
              <div style={{fontSize:12,fontWeight:700,color:C.white,marginBottom:6}}>
                {DAYS[selDay]} {fS(selDate)} - {sec.label} <span style={{fontSize:10,fontWeight:400,color:C.dim}}>({sec.desc})</span>
              </div>
              <FastGrid key={sec.id+dkv} sectionKey={sec.id} sites={sec.sites} slots={sec.slots} slotLabels={sec.slotLabels} fields={sec.fields} data={data} dayKey={dkv} onSave={saveSection} user={user} siteExtra={sec.siteExtra}/>
            </div>
        }
      </div>

      {/* Midnight Report Alarm */}
      {midnightAlert&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
        <div className="alarm-box" style={{background:C.s,border:"2px solid "+C.r,borderRadius:10,padding:"30px 40px",maxWidth:440,textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:8}}>&#9200;</div>
          <div style={{fontSize:16,fontWeight:700,color:C.r,marginBottom:6,fontFamily:ft}}>END OF DAY</div>
          <div style={{fontSize:12,color:C.white,marginBottom:4,fontFamily:ft}}>It's midnight — time to save today's report.</div>
          <div style={{fontSize:10,color:C.dim,marginBottom:20,fontFamily:ft}}>Download the daily report and/or CSV before the day rolls over.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={midnightDownload} style={{padding:"10px 20px",background:C.g,color:C.bg,border:"none",borderRadius:5,fontSize:12,fontWeight:700,fontFamily:ft,cursor:"pointer",letterSpacing:1}}>Open Report</button>
            <button onClick={()=>{exportCSV();dismissMidnight()}} style={{padding:"10px 20px",background:C.o,color:"#fff",border:"none",borderRadius:5,fontSize:12,fontWeight:700,fontFamily:ft,cursor:"pointer",letterSpacing:1}}>Export CSV</button>
            <button onClick={dismissMidnight} style={{padding:"10px 20px",background:"transparent",border:"1px solid "+C.brd,borderRadius:5,color:C.dim,fontSize:12,fontFamily:ft,cursor:"pointer"}}>Dismiss</button>
          </div>
          <div style={{fontSize:9,color:C.dim,marginTop:14,fontFamily:ft}}>This alert appears once between 23:55 and 00:05</div>
        </div>
      </div>}

      <SitePopup siteName={sitePopup} onClose={()=>setSitePopup(null)}/>
      {showReport&&<Report data={data} dayKey={dkv} user={user} onClose={()=>setShowReport(false)}/>}
      <div style={{textAlign:"center",padding:"12px 0",fontSize:9,color:C.dim,borderTop:"1px solid "+C.brd,marginTop:12}}>ROCC Operations Log v5.0 | AES Clean Energy | Developed by Rocky Dev Co.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
